<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaimir</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<!-- 顶栏 -->
<div class="topnav">
  <a class="brand" href="index.html">
    <span class="logo-mark"><i data-lucide="link-2"></i></span>
    Chaimir
  </a>
  <div class="role-switch" id="roleSwitch" style="margin-left:8px"></div>
  <div class="spacer"></div>
  <div class="nav-icon" id="bellBtn" onclick="togglePanel('notify')">
    <i data-lucide="bell"></i><span class="dot"></span>
  </div>
  <div class="dropdown" id="avatarDrop">
    <div class="avatar" onclick="togglePanel('avatar')">
      <span class="ava" id="avaText">张</span>
      <span class="uname" id="avaName">张同学</span>
      <i data-lucide="chevron-down" style="width:15px;height:15px;color:var(--slate-400)"></i>
    </div>
    <div class="dropdown-menu">
      <div class="dropdown-head">
        <div class="fw-600" id="dropName">张同学</div>
        <div class="text-xs muted" id="dropRole">学生 · 北京大学</div>
      </div>
      <a class="dropdown-item"><i data-lucide="user"></i> 个人中心</a>
      <a class="dropdown-item"><i data-lucide="settings"></i> 账号设置</a>
      <a class="dropdown-item" href="login.html"><i data-lucide="log-out"></i> 退出登录</a>
    </div>
  </div>
</div>

<!-- 通知面板 -->
<div class="notify-panel" id="notifyPanel">
  <div style="padding:12px 14px;border-bottom:1px solid var(--slate-200)" class="flex items-center justify-between">
    <span class="fw-600">通知</span><a class="text-xs" style="color:var(--amber-600)">全部已读</a>
  </div>
  <div class="notify-item unread"><span class="notify-dot"></span><div><div class="text-sm fw-600">作业即将截止</div><div class="text-xs muted">《智能合约基础》作业 3 将于 2 小时后截止</div></div></div>
  <div class="notify-item unread"><span class="notify-dot"></span><div><div class="text-sm fw-600">实验判题完成</div><div class="text-xs muted">PoW 挖矿实验检查点 2 已通过</div></div></div>
  <div class="notify-item"><span class="notify-dot" style="background:transparent"></span><div><div class="text-sm fw-600">竞赛排名更新</div><div class="text-xs muted">你在「链上夺旗赛」当前排名第 5</div></div></div>
</div>

<!-- 主体 -->
<div class="app-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>

<!-- 沉浸工作模态 -->
<div class="immersive" id="immersive">
  <div class="minibar">
    <a class="back" onclick="exitImmersive()"><i data-lucide="arrow-left" style="width:16px;height:16px"></i> 返回</a>
    <span class="task-name" id="imTaskName">实验工作台</span>
    <div class="spacer"></div>
    <span class="cp-chip" id="imChip">检查点 2/5</span>
    <button class="btn btn-primary btn-sm" id="imAction">提交</button>
  </div>
  <div class="workspace" id="workspace"></div>
</div>

<script src="app.js"></script>
</body>
</html>
