# kind 集群配置(本地 K8s,验证沙箱隔离/NetworkPolicy/RBAC 全链路)。
# 依据 docs/总-部署架构设计.md §四:local-dev 用 kind;与生产 K8s 同构。
# extraPortMappings 将容器 80/443 映射到宿主,供 ingress-nginx 暴露。
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: chaimir
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # 给 control-plane 打 ingress-ready 标签,供 ingress-nginx 调度。
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
