# local-dev overlay:现有 Kubernetes 集群,中间件单实例,本地镜像,dev 密钥。
# 依据 docs/总-部署架构设计.md §四/§五:local-dev 使用当前 kubeconfig 指向的集群 + 单实例中间件。
# 一键拉起见 deploy/Makefile(dev-up:装 ingress/metrics → apply 本 overlay → 跑 migrate)。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# 中间件单实例随本地集群一起拉起(SaaS/staging 不 include,用外接托管)。
components:
  - ../../components/middleware

# dev 密钥:从 deploy/config/secret.env(被 .gitignore 忽略)生成。
# make dev-up 会在首次运行时由 secret.env.example 生成随机值写入 config/secret.env。
# 生成两份(命名空间隔离):chaimir-system 给应用,chaimir-data 给中间件。同源文件,单一来源。
secretGenerator:
  - name: chaimir-secret
    namespace: chaimir-system
    envs:
      - ../../config/secret.env
  - name: chaimir-data-secret
    namespace: chaimir-data
    envs:
      - ../../config/secret.env

# 本地验收镜像也必须使用 Harbor digest,不再保留旧 chaimir/*:dev 兼容路径。
images:
  - name: chaimir/backend
    newName: harbor.chaimir:30080/service/backend
    digest: sha256:01bec1df5a9e87628e024d63a5522eb8d06d68be96b7b415bec5aa3a7d7b89a7
  - name: chaimir/frontend
    newName: chaimir/frontend
    newTag: dev
  - name: chaimir/migrate
    newName: harbor.chaimir:30080/service/migrate
    digest: sha256:e686bce806c20391f51bc4288264051af8b5b6128179d190b061d5a3d714ab57
  - name: chaimir/cron
    newName: harbor.chaimir:30080/service/cron
    digest: sha256:67ef95de11ddd238b0e0e75aa58fbaa30314eb856e211485bb449b7209a1aac6
  - name: chaimir/middleware/clamav
    newName: harbor.chaimir:30080/middleware/clamav
    digest: sha256:833c257e088e8480f825bf03dc5c37d907747acb2c371c51a07034a38cc24143
  - name: chaimir/middleware/minio
    newName: harbor.chaimir:30080/middleware/minio
    digest: sha256:5d4553bf53b4981ca52343d86271c71a1e6d20859133561f01ac645b389755b6
  - name: chaimir/middleware/nats
    newName: harbor.chaimir:30080/middleware/nats
    digest: sha256:9524c61e8791a6417ff875878adb8229865bf99d00fe1b6bf5192ece77adde95
  - name: chaimir/middleware/postgres
    newName: harbor.chaimir:30080/middleware/postgres
    digest: sha256:ef20d46eba750371f6710e18cae1502e7dc538afd4aab4a0d8937712f2aefc31
  - name: chaimir/middleware/redis
    newName: harbor.chaimir:30080/middleware/redis
    digest: sha256:0ba43c28f35d08b10f4a4b56ce249aee7bd3541ec8215b30682cffb59d84a37d

# 本地形态:SaaS 多租户 + 平台层开(便于本地验证全功能)。
configMapGenerator:
  - name: chaimir-config
    namespace: chaimir-system
    behavior: merge
    literals:
      - APP_ENV=local
      - DEPLOY_MODE=saas
      - PLATFORM_LAYER_ENABLED=true
      - LOG_LEVEL=debug
      - PG_SSLMODE=disable
      - SMS_HTTP_ENDPOINT=http://sms-gateway.chaimir-system.svc.cluster.local:18080/sms
      - SMS_HTTP_ALLOW_LOOPBACK=false
      - SMS_TEMPLATE_LOGIN=local-login
      - SMS_TEMPLATE_RESET=local-reset
      - SMS_TEMPLATE_CHANGE_PHONE=local-change-phone
