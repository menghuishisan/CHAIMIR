# prod-saas overlay:SaaS 公网生产,多副本 + HPA,中间件外接,真实证书,KMS 密钥。
# 依据 docs/总-部署架构设计.md §四/§五/§八/§九:多副本水平扩展;托管/集群中间件;
#   全站 HTTPS;密钥经 KMS;tag→人工审批→部署。
#
# 密钥:由 External Secrets/KMS 在集群创建 Secret chaimir-secret(不用 secretGenerator)。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - hpa.yaml
  # 不 include middleware:生产用托管主从/集群。

components:
  - ../../config/external-secret

images:
  - name: chaimir/backend
    newName: harbor.chaimir.io/service/backend
    newTag: "1.0.0"  # CD 按 tag 覆盖。
  - name: chaimir/frontend
    newName: harbor.chaimir.io/service/frontend
    newTag: "1.0.0"
  - name: chaimir/migrate
    newName: harbor.chaimir.io/service/migrate
    newTag: "1.0.0"

configMapGenerator:
  - name: chaimir-config
    namespace: chaimir-system
    behavior: merge
    literals:
      - DEPLOY_MODE=saas
      - PLATFORM_LAYER_ENABLED=true
      - LOG_LEVEL=info
      - PG_SSLMODE=require
      - PG_HOST=postgres.prod-data.internal
      - REDIS_HOST=redis.prod-data.internal
      - NATS_URL=nats://nats.prod-data.internal:4222
      - MINIO_ENDPOINT=minio.prod-data.internal:9000

# 生产后端起步 3 副本(HPA 接管伸缩区间)。
replicas:
  - name: chaimir-backend
    count: 3

patches:
  # 生产域名 + TLS + 可选 WAF(cert-manager 签发,WAF 经 ingress 注解可选开启)。
  - target:
      kind: Ingress
      name: chaimir
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: www.chaimir.io
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: chaimir-prod-issuer
      - op: add
        path: /spec/tls
        value:
          - hosts: ["www.chaimir.io"]
            secretName: chaimir-tls
  # prod-saas 密钥 Store 与远端键前缀。ExternalSecret 键集合统一维护在 deploy/config。
  - target:
      kind: ExternalSecret
      name: chaimir-secret
    patch: |-
      - op: replace
        path: /spec/secretStoreRef/name
        value: chaimir-prod-secret-store
      - op: replace
        path: /spec/refreshInterval
        value: 5m
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: prod/chaimir/JWT_SIGNING_KEY
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: prod/chaimir/APP_ENCRYPTION_KEY
      - op: replace
        path: /spec/data/2/remoteRef/key
        value: prod/chaimir/APP_HMAC_KEY
      - op: replace
        path: /spec/data/3/remoteRef/key
        value: prod/chaimir/PG_PASSWORD
      - op: replace
        path: /spec/data/4/remoteRef/key
        value: prod/chaimir/PG_PRIV_USER
      - op: replace
        path: /spec/data/5/remoteRef/key
        value: prod/chaimir/PG_PRIV_PASSWORD
      - op: replace
        path: /spec/data/6/remoteRef/key
        value: prod/chaimir/REDIS_PASSWORD
      - op: replace
        path: /spec/data/7/remoteRef/key
        value: prod/chaimir/MINIO_ACCESS_KEY
      - op: replace
        path: /spec/data/8/remoteRef/key
        value: prod/chaimir/MINIO_SECRET_KEY
      - op: replace
        path: /spec/data/9/remoteRef/key
        value: prod/chaimir/NATS_TOKEN
      - op: replace
        path: /spec/data/10/remoteRef/key
        value: prod/chaimir/BOOTSTRAP_ADMIN_PHONE
      - op: replace
        path: /spec/data/11/remoteRef/key
        value: prod/chaimir/BOOTSTRAP_ADMIN_NAME
      - op: replace
        path: /spec/data/12/remoteRef/key
        value: prod/chaimir/BOOTSTRAP_ADMIN_PASSWORD
      - op: replace
        path: /spec/data/13/remoteRef/key
        value: prod/chaimir/BOOTSTRAP_PLATFORM_ADMIN_PASSWORD
