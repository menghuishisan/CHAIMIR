# prod-saas HPA:后端单体按 CPU/内存伸缩。
# 依据 docs/总-部署架构设计.md §三:当前 server 进程内承载 HTTP/WS 与模块后台任务。
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chaimir-backend
  namespace: chaimir-system
  labels:
    app.kubernetes.io/part-of: chaimir
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chaimir-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
