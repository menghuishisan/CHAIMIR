# staging overlay:预发布,SaaS 形态,中间件外接,自动部署目标(main 分支)。
# 依据 docs/总-部署架构设计.md §四/§五/§六:staging 由 main 自动部署;中间件用托管。
#
# 密钥:不用 secretGenerator —— Secret chaimir-secret 由 External Secrets Operator / KMS
#   在集群预创建(base 资源以字面名引用)。镜像从 Harbor 拉取。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # 不 include middleware:用托管 PG/Redis/NATS/MinIO,经 ConfigMap 指向外部端点。

components:
  - ../../config/external-secret

images:
  - name: chaimir/backend
    newName: harbor.chaimir/service/backend
    newTag: staging
  - name: chaimir/frontend
    newName: harbor.chaimir/service/frontend
    newTag: staging
  - name: chaimir/migrate
    newName: harbor.chaimir/service/migrate
    newTag: staging
  - name: chaimir/cron
    newName: harbor.chaimir/service/cron
    newTag: staging

# 中间件外接端点 + SaaS 形态(host 为 staging 托管中间件内部域名)。
configMapGenerator:
  - name: chaimir-config
    namespace: chaimir-system
    behavior: merge
    literals:
      - DEPLOY_MODE=saas
      - PLATFORM_LAYER_ENABLED=true
      - LOG_LEVEL=info
      - PG_SSLMODE=require
      - PG_HOST=postgres.staging-data.internal
      - REDIS_HOST=redis.staging-data.internal
      - NATS_URL=nats://nats.staging-data.internal:4222
      - MINIO_ENDPOINT=minio.staging-data.internal:9000
      - UPLOAD_VIRUS_SCAN_ADDRESS=clamav.staging-data.internal:3310

# 预发布双副本(轻量验证伸缩)。
replicas:
  - name: chaimir-backend
    count: 2

patches:
  # staging 域名。
  - target:
      kind: Ingress
      name: chaimir
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.chaimir.example.com
  # staging 密钥 Store 与远端键前缀。ExternalSecret 键集合统一维护在 deploy/config。
  - target:
      kind: ExternalSecret
      name: chaimir-secret
    patch: |-
      - op: replace
        path: /spec/secretStoreRef/name
        value: chaimir-staging-secret-store
      - op: replace
        path: /spec/refreshInterval
        value: 15m
      - op: replace
        path: /spec/data
        value:
          - secretKey: JWT_SIGNING_KEY
            remoteRef: {key: staging/chaimir/JWT_SIGNING_KEY}
          - secretKey: APP_ENCRYPTION_KEY
            remoteRef: {key: staging/chaimir/APP_ENCRYPTION_KEY}
          - secretKey: APP_HMAC_KEY
            remoteRef: {key: staging/chaimir/APP_HMAC_KEY}
          - secretKey: PG_PASSWORD
            remoteRef: {key: staging/chaimir/PG_PASSWORD}
          - secretKey: PG_PRIV_USER
            remoteRef: {key: staging/chaimir/PG_PRIV_USER}
          - secretKey: PG_PRIV_PASSWORD
            remoteRef: {key: staging/chaimir/PG_PRIV_PASSWORD}
          - secretKey: REDIS_PASSWORD
            remoteRef: {key: staging/chaimir/REDIS_PASSWORD}
          - secretKey: MINIO_ACCESS_KEY
            remoteRef: {key: staging/chaimir/MINIO_ACCESS_KEY}
          - secretKey: MINIO_SECRET_KEY
            remoteRef: {key: staging/chaimir/MINIO_SECRET_KEY}
          - secretKey: NATS_TOKEN
            remoteRef: {key: staging/chaimir/NATS_TOKEN}
          - secretKey: GRADE_TRANSCRIPT_SIGNING_KEY
            remoteRef: {key: staging/chaimir/GRADE_TRANSCRIPT_SIGNING_KEY}
          - secretKey: SMS_HTTP_TOKEN
            remoteRef: {key: staging/chaimir/SMS_HTTP_TOKEN}
          - secretKey: CHAIMIR_WALLET_SIGNER_PRIVATE_KEY
            remoteRef: {key: staging/chaimir/CHAIMIR_WALLET_SIGNER_PRIVATE_KEY}
          - secretKey: CHAIMIR_WALLET_SESSION_SECRET
            remoteRef: {key: staging/chaimir/CHAIMIR_WALLET_SESSION_SECRET}
          - secretKey: CHAIMIR_PAYMASTER_PRIVATE_KEY
            remoteRef: {key: staging/chaimir/CHAIMIR_PAYMASTER_PRIVATE_KEY}
          - secretKey: CHAIMIR_PAYMASTER_SERVICE_AUTH_SECRET
            remoteRef: {key: staging/chaimir/CHAIMIR_PAYMASTER_SERVICE_AUTH_SECRET}
          - secretKey: CHAIMIR_EVENT_LISTENER_SERVICE_AUTH_SECRET
            remoteRef: {key: staging/chaimir/CHAIMIR_EVENT_LISTENER_SERVICE_AUTH_SECRET}
          - secretKey: BOOTSTRAP_ADMIN_PHONE
            remoteRef: {key: staging/chaimir/BOOTSTRAP_ADMIN_PHONE}
          - secretKey: BOOTSTRAP_ADMIN_NAME
            remoteRef: {key: staging/chaimir/BOOTSTRAP_ADMIN_NAME}
          - secretKey: BOOTSTRAP_ADMIN_PASSWORD
            remoteRef: {key: staging/chaimir/BOOTSTRAP_ADMIN_PASSWORD}
          - secretKey: BOOTSTRAP_PLATFORM_ADMIN_PASSWORD
            remoteRef: {key: staging/chaimir/BOOTSTRAP_PLATFORM_ADMIN_PASSWORD}
