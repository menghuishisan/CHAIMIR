# ClamAV 单实例病毒扫描服务。
# 依据 AGENTS.md 安全标准:文件上传必须执行类型/大小/病毒校验;后端通过 clamd INSTREAM 协议访问 3310。
# 项目 Harbor 中间件镜像自带非 root 入口,避免在数据命名空间放宽权限。
---
apiVersion: v1
kind: Service
metadata:
  name: clamav
  namespace: chaimir-data
  labels:
    app.kubernetes.io/name: clamav
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: chaimir
spec:
  selector:
    app.kubernetes.io/name: clamav
  ports:
    - name: clamd
      port: 3310
      targetPort: 3310
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clamav
  namespace: chaimir-data
  labels:
    app.kubernetes.io/name: clamav
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: chaimir
spec:
  serviceName: clamav
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clamav
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clamav
        app.kubernetes.io/part-of: chaimir
    spec:
      imagePullSecrets:
        - name: chaimir-harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clamav
          image: chaimir/middleware/clamav:placeholder
          ports:
            - name: clamd
              containerPort: 3310
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: 250m, memory: 1Gi}
            limits: {cpu: "1", memory: 2Gi}
          readinessProbe:
            tcpSocket:
              port: clamd
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: clamd
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - name: database
              mountPath: /var/lib/clamav
            - name: log
              mountPath: /var/log/clamav
            - name: run
              mountPath: /run/clamav
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: log
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: database
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
