# NATS 2.10 单实例(事件总线,模块反向通信)。
# 依据 docs/总-技术选型.md §9:NATS 2.10+;docs/总-工程目录设计:反向通信走 NATS 事件。
# 官方镜像不重打包。token 认证从 chaimir-secret 注入。
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: chaimir-data
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: chaimir
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: chaimir-data
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: chaimir
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: chaimir
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          # JetStream 持久化 + token 认证(token 经环境变量,不硬编码)。
          command: ["sh", "-c", "exec nats-server -js -sd /data -m 8222 --auth \"$NATS_TOKEN\""]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          env:
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chaimir-data-secret
                  key: NATS_TOKEN
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: 100m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
