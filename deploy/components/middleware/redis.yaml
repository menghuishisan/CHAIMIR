# Redis 7 单实例(缓存/会话/未读计数/队列)。
# 依据 docs/总-技术选型.md §9:Redis 7+;官方镜像不重打包。
# 密码从 chaimir-secret 注入(--requirepass)。
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: chaimir-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: chaimir
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: chaimir-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: chaimir
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: chaimir
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # 官方 redis 镜像的 redis 用户。
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          # 从环境变量读取密码并以 requirepass 启动(避免硬编码到 args)。
          command: ["sh", "-c", "exec redis-server --requirepass \"$REDIS_PASSWORD\" --appendonly yes"]
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chaimir-data-secret
                  key: REDIS_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: 100m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
