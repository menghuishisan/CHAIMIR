# ExternalSecret 统一模板。
# 职责:定义 chaimir-secret 所需密钥键集合;环境 overlay 只覆盖 secretStoreRef、刷新周期和 remoteRef 前缀。
# 依据 CLAUDE.md §6/§7:密钥走 K8s Secret/KMS,不入代码、不入镜像、不入仓库。
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chaimir-secret
  namespace: chaimir-system
  labels:
    app.kubernetes.io/part-of: chaimir
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: chaimir-external-secret-store
  target:
    name: chaimir-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SIGNING_KEY
      remoteRef: {key: chaimir/JWT_SIGNING_KEY}
    - secretKey: APP_ENCRYPTION_KEY
      remoteRef: {key: chaimir/APP_ENCRYPTION_KEY}
    - secretKey: APP_HMAC_KEY
      remoteRef: {key: chaimir/APP_HMAC_KEY}
    - secretKey: PG_PASSWORD
      remoteRef: {key: chaimir/PG_PASSWORD}
    - secretKey: PG_PRIV_USER
      remoteRef: {key: chaimir/PG_PRIV_USER}
    - secretKey: PG_PRIV_PASSWORD
      remoteRef: {key: chaimir/PG_PRIV_PASSWORD}
    - secretKey: REDIS_PASSWORD
      remoteRef: {key: chaimir/REDIS_PASSWORD}
    - secretKey: MINIO_ACCESS_KEY
      remoteRef: {key: chaimir/MINIO_ACCESS_KEY}
    - secretKey: MINIO_SECRET_KEY
      remoteRef: {key: chaimir/MINIO_SECRET_KEY}
    - secretKey: NATS_TOKEN
      remoteRef: {key: chaimir/NATS_TOKEN}
    - secretKey: BOOTSTRAP_ADMIN_PHONE
      remoteRef: {key: chaimir/BOOTSTRAP_ADMIN_PHONE}
    - secretKey: BOOTSTRAP_ADMIN_NAME
      remoteRef: {key: chaimir/BOOTSTRAP_ADMIN_NAME}
    - secretKey: BOOTSTRAP_ADMIN_PASSWORD
      remoteRef: {key: chaimir/BOOTSTRAP_ADMIN_PASSWORD}
    - secretKey: BOOTSTRAP_PLATFORM_ADMIN_PASSWORD
      remoteRef: {key: chaimir/BOOTSTRAP_PLATFORM_ADMIN_PASSWORD}
