# 可复用 composite action:构建 → Trivy 扫描(高危阻断)→ 推 Harbor → Cosign 签名与验签。
# 依据 docs/总-部署架构设计.md §六 + docs/总-镜像与容器设计.md §九:
#   多阶段构建 → Trivy 漏洞扫描(高危阻断)→ 推 Harbor并解析 digest → Cosign 签名与验签。
# 全平台镜像流水线统一调用此 action(CLAUDE.md §4:同类问题统一一种方案)。
name: build-scan-sign-push
description: 构建镜像、Trivy 扫描、推送 Harbor、Cosign 签名并验签

inputs:
  image:
    description: 镜像完整名(含 registry/project/name,不含 tag)
    required: true
  tag:
    description: 镜像标签
    required: true
  context:
    description: 构建上下文目录
    required: true
  dockerfile:
    description: Dockerfile 路径
    required: true
  build-args:
    description: 逐行传入 docker build 的构建参数,格式为 KEY=VALUE
    required: false
    default: ""
  registry:
    description: Harbor 仓库地址
    required: true
  registry-username:
    description: Harbor 登录用户(经 secrets 注入)
    required: true
  registry-password:
    description: Harbor 登录密码(经 secrets 注入)
    required: true
  cosign-key:
    description: Cosign 私钥(经 secrets 注入)
    required: true
  cosign-password:
    description: Cosign 私钥口令(经 secrets 注入)
    required: true

outputs:
  digest:
    description: 推送到 Harbor 后解析出的不可变镜像 digest
    value: ${{ steps.digest.outputs.digest }}
  digest_ref:
    description: 生产部署与离线拉取使用的 image@digest 引用
    value: ${{ steps.digest.outputs.digest_ref }}

runs:
  using: composite
  steps:
    - name: 登录 Harbor
      shell: bash
      run: |
        echo "${{ inputs.registry-password }}" | \
          docker login "${{ inputs.registry }}" -u "${{ inputs.registry-username }}" --password-stdin

    - name: 多阶段构建镜像
      shell: bash
      env:
        BUILD_ARGS: ${{ inputs.build-args }}
      run: |
        build_args=()
        while IFS= read -r build_arg; do
          if [ -n "$build_arg" ]; then
            build_args+=(--build-arg "$build_arg")
          fi
        done <<< "$BUILD_ARGS"
        docker build \
          --pull \
          -f "${{ inputs.dockerfile }}" \
          "${build_args[@]}" \
          -t "${{ inputs.image }}:${{ inputs.tag }}" \
          "${{ inputs.context }}"

    - name: Trivy 漏洞扫描(高危/严重阻断)
      shell: bash
      run: |
        set -euo pipefail

        logical="${{ inputs.image }}"
        logical="${logical#${{ inputs.registry }}/}"
        manifest="images/${logical}/manifest.yaml"
        skip_args=()
        if [ -f "$manifest" ]; then
          skip_reason="$(awk '
            /^supply_chain:[[:space:]]*$/ { inside=1; next }
            inside && /^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/ { inside=0 }
            inside && /^[[:space:]]+trivy_skip_reason:[[:space:]]*/ {
              sub("^[[:space:]]+trivy_skip_reason:[[:space:]]*", "");
              gsub(/^["'\''"]|["'\''"]$/, "");
              print;
              exit;
            }
          ' "$manifest")"
          mapfile -t skip_files < <(awk '
            /^supply_chain:[[:space:]]*$/ { sc=1; next }
            sc && /^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/ { sc=0; sf=0 }
            sc && /^[[:space:]]+trivy_skip_files:[[:space:]]*$/ { sf=1; next }
            sf && /^[[:space:]]+-[[:space:]]*/ {
              sub("^[[:space:]]+-[[:space:]]*", "");
              gsub(/^["'\''"]|["'\''"]$/, "");
              print;
              next;
            }
            sf && /^[[:space:]]+[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/ { sf=0 }
          ' "$manifest")
          if [ "${#skip_files[@]}" -gt 0 ] && [ -z "$skip_reason" ]; then
            echo "$manifest 声明 trivy_skip_files 但缺少 trivy_skip_reason" >&2
            exit 1
          fi
          for skip_file in "${skip_files[@]}"; do
            skip_args+=(--skip-files "$skip_file")
          done
        fi

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -e TRIVY_DB_REPOSITORY=ghcr.io/aquasecurity/trivy-db:2 \
          aquasec/trivy:0.71.2 image \
            --format table \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --scanners vuln,secret \
            --ignore-unfixed=false \
            "${skip_args[@]}" \
            "${{ inputs.image }}:${{ inputs.tag }}"

    - name: 推送镜像到 Harbor
      shell: bash
      run: docker push "${{ inputs.image }}:${{ inputs.tag }}"

    - name: 解析推送后的不可变 digest
      id: digest
      shell: bash
      run: |
        digest=$(docker buildx imagetools inspect "${{ inputs.image }}:${{ inputs.tag }}" --format '{{.Manifest.Digest}}')
        if [ -z "$digest" ] || [ "$digest" = "<no value>" ]; then
          echo "无法解析镜像 digest: ${{ inputs.image }}:${{ inputs.tag }}" >&2
          exit 1
        fi
        echo "digest=$digest" >> "$GITHUB_OUTPUT"
        echo "digest_ref=${{ inputs.image }}@$digest" >> "$GITHUB_OUTPUT"

    - name: Cosign 签名并验签(未验证不得晋升)
      shell: bash
      env:
        COSIGN_PASSWORD: ${{ inputs.cosign-password }}
      run: |
        set -euo pipefail
        key_file=$(mktemp)
        public_key_file=$(mktemp)
        trap 'rm -f "$key_file" "$public_key_file"' EXIT
        echo "${{ inputs.cosign-key }}" > "$key_file"
        cosign public-key --key "$key_file" > "$public_key_file"
        cosign sign --yes --key "$key_file" "${{ steps.digest.outputs.digest_ref }}"
        cosign verify --key "$public_key_file" "${{ steps.digest.outputs.digest_ref }}"
