# Trivy 扫描配置(全平台镜像统一基线)。
# 依据 docs/总-镜像与容器设计.md §九:高危漏洞阻断。
# CI 中经 build-scan-sign-push action 调用;本文件为可被 `trivy --config` 引用的统一基线。
severity:
  - HIGH
  - CRITICAL
# 命中高危/严重即非零退出,阻断推送。
exit-code: 1
# 生产门禁不忽略 unfixed。无官方修复版本的高危/严重漏洞必须通过上游替换、
# 源码重建或 manifest deployable=false 阻断处理,不得在扫描层静默放行。
ignore-unfixed: false
vulnerability:
  type:
    - os
    - library
scan:
  scanners:
    - vuln
    - secret      # 同时扫描镜像内误打包的密钥。
timeout: 10m
