# 后端单体的 ServiceAccount 与最小 RBAC。
# 依据 docs/总-部署架构设计.md §二/§九:
#   后端 ServiceAccount 通过 client-go 创建/销毁动态沙箱命名空间(sbx-*/judge-*/battle-*)
#   及其中的 Pod;权限取最小集,绝不授予集群管理员。
#
# K8s RBAC 局限说明(重要):
#   RBAC 的 resourceNames 不支持通配,无法限定"仅能操作名为 sbx-*/judge-*/battle-* 的命名空间"。
#   因此 namespace 的 create/delete 是集群级动词。名称模式与"仅删除自己创建的命名空间"
#   这一约束由 M2 沙箱控制面代码强制(创建时打平台所有权标签,删除前校验),并由
#   base/admission/sandbox-namespace-policy.yaml 的 ValidatingAdmissionPolicy 在准入层兜底。
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaimir-backend
  namespace: chaimir-system
  labels:
    app.kubernetes.io/name: chaimir-backend
    app.kubernetes.io/part-of: chaimir
---
# 集群级:仅命名空间生命周期 + 节点/命名空间只读(调度决策需要)。
# 不含 secrets/configmaps 的集群级读,不含任何 RBAC/集群资源写。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaimir-backend-sandbox-ns
  labels:
    app.kubernetes.io/part-of: chaimir
rules:
  # 动态沙箱命名空间的创建/销毁(名称模式由代码 + ValidatingAdmissionPolicy 约束)。
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # 调度与配额决策需读取节点信息(只读)。
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
# 命名空间内工作负载管理权限,经下方 ClusterRoleBinding 绑定后,
# 在后端创建的每个动态命名空间内由 client-go 套用(此处定义为可复用 ClusterRole,
# 实际作用域受动态命名空间存在性约束;沙箱命名空间用后即毁,权限随之失效)。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaimir-backend-sandbox-workload
  labels:
    app.kubernetes.io/part-of: chaimir
rules:
  # 沙箱 Pod 组的编排(每沙箱 = Namespace + Pod(s),见 docs/镜像 §三之二)。
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "pods/status"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # 工具容器(code-server/remix 等)的 ClusterIP 暴露 + 配置注入。
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # 持久卷声明(部分实验需可写卷)。
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # 沙箱命名空间的 deny-all NetworkPolicy 由后端套用(SSOT 模板见 networkpolicy)。
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # 资源硬限(沙箱配额约束)。
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaimir-backend-sandbox-ns
  labels:
    app.kubernetes.io/part-of: chaimir
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaimir-backend-sandbox-ns
subjects:
  - kind: ServiceAccount
    name: chaimir-backend
    namespace: chaimir-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaimir-backend-sandbox-workload
  labels:
    app.kubernetes.io/part-of: chaimir
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaimir-backend-sandbox-workload
subjects:
  - kind: ServiceAccount
    name: chaimir-backend
    namespace: chaimir-system
