# 部署层受控定时任务。
# 当前仅保留已实现的每日备份任务;模块生命周期清理由各模块 server 内后台任务负责。
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaimir-cron
  namespace: chaimir-system
  labels:
    app.kubernetes.io/name: chaimir-cron
    app.kubernetes.io/part-of: chaimir
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: chaimir-daily-backup
  namespace: chaimir-system
  labels:
    app.kubernetes.io/part-of: chaimir
    app.kubernetes.io/component: cronjob
spec:
  schedule: "23 2 * * *"  # 每日 02:23 全量备份 DB + MinIO 业务对象,并写入 M9 backup_record。
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: chaimir
        spec:
          restartPolicy: Never
          serviceAccountName: chaimir-cron
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: chaimir/cron:placeholder
              args: ["--task=backup"]
              envFrom:
                - configMapRef:
                    name: chaimir-config
                - secretRef:
                    name: chaimir-secret
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: backup-tmp
                  mountPath: /tmp
              resources:
                requests: {cpu: 100m, memory: 256Mi, ephemeral-storage: 1Gi}
                limits: {cpu: "1", memory: 1Gi, ephemeral-storage: 4Gi}
          volumes:
            - name: backup-tmp
              emptyDir:
                sizeLimit: 4Gi
