# 前端 Deployment + Service(四角色共用的 React 单 SPA,Nginx 托管)。
# 依据 docs/总-镜像与容器设计.md §二:chaimir/frontend 为 Nginx 托管的静态构建产物。
# 四角色(student/teacher/school-admin/platform-admin)由同一 SPA 的路径路由分发;
# prod-school overlay 关闭 platform-admin 入口(Ingress patch + 形态开关)。
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaimir-frontend
  namespace: chaimir-system
  labels:
    app.kubernetes.io/name: chaimir-frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: chaimir
spec:
  replicas: 1  # overlay 覆盖。
  selector:
    matchLabels:
      app.kubernetes.io/name: chaimir-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaimir-frontend
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: chaimir
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx unprivileged 镜像默认 uid。
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: chaimir/frontend:placeholder  # overlay images: 覆盖。
          ports:
            - name: http
              containerPort: 8080  # 用非特权端口(non-root nginx)。
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            # nginx 非 root + 只读根:提供可写的缓存/运行目录。
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: chaimir-frontend
  namespace: chaimir-system
  labels:
    app.kubernetes.io/name: chaimir-frontend
    app.kubernetes.io/part-of: chaimir
spec:
  selector:
    app.kubernetes.io/name: chaimir-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
