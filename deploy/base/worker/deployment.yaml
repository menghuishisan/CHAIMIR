# 后端 worker Deployment(判题调度 / 撮合)。
# 依据 docs/总-镜像与容器设计.md §二:worker 与后端"同镜像不同启动参数"。
# 依据 docs/总-部署架构设计.md §三:worker 按队列积压伸缩。
# 复用 chaimir/backend 镜像,以不同子命令启动;无对外 Service(消费队列/事件)。
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaimir-worker-judge
  namespace: chaimir-system
  labels:
    app.kubernetes.io/name: chaimir-worker-judge
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: chaimir
spec:
  replicas: 1  # overlay 覆盖:prod 按积压 HPA。
  selector:
    matchLabels:
      app.kubernetes.io/name: chaimir-worker-judge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaimir-worker-judge
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: chaimir
    spec:
      serviceAccountName: chaimir-backend  # 判题需创建 judge-* 动态沙箱。
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: chaimir/backend:placeholder
          args: ["worker", "--queue=judge"]  # 判题调度 worker。
          envFrom:
            - configMapRef:
                name: chaimir-config
            - secretRef:
                name: chaimir-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaimir-worker-matchmaking
  namespace: chaimir-system
  labels:
    app.kubernetes.io/name: chaimir-worker-matchmaking
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: chaimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chaimir-worker-matchmaking
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaimir-worker-matchmaking
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: chaimir
    spec:
      serviceAccountName: chaimir-backend  # 对局需创建 battle-* 动态沙箱。
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: chaimir/backend:placeholder
          args: ["worker", "--queue=matchmaking"]  # 竞赛撮合 worker。
          envFrom:
            - configMapRef:
                name: chaimir-config
            - secretRef:
                name: chaimir-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
