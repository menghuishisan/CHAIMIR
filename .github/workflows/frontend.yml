# 前端镜像流水线:lint + 构建 → 镜像构建 → Trivy 扫描 → Cosign 签名 → 推 Harbor。
# 依据 docs/总-部署架构设计.md §六:路径触发,frontend 各自流水线。
# 路径触发:frontend/ 变更才跑(目录4 产出代码后激活)。
name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "images/service/frontend/**"
      - ".github/workflows/frontend.yml"
      - "deploy/ci/**"
  pull_request:
    paths:
      - "frontend/**"
      - "images/service/frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: 安装依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint + 类型检查
        working-directory: frontend
        run: |
          pnpm lint
          pnpm type-check
      - name: 构建四端静态资源
        working-directory: frontend
        run: pnpm build

  build-push:
    needs: lint-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3
      - name: 构建+扫描+签名+推送(frontend)
        uses: ./deploy/ci/build-scan-sign-push
        with:
          image: ${{ secrets.HARBOR_REGISTRY }}/service/frontend
          tag: ${{ github.sha }}
          context: .
          dockerfile: images/service/frontend/Dockerfile
          build-args: |
            NODE_BUILDER_IMAGE=${{ secrets.HARBOR_REGISTRY }}/base/node-builder@sha256:756ec7bd7306ea9038422dece9c70806e2b75201c7ac0097146d4fa11f0b9c7b
          registry: ${{ secrets.HARBOR_REGISTRY }}
          registry-username: ${{ secrets.HARBOR_USERNAME }}
          registry-password: ${{ secrets.HARBOR_PASSWORD }}
          cosign-key: ${{ secrets.COSIGN_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}
