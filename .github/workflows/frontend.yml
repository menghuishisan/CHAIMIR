# 前端镜像流水线:lint + 构建 → 镜像构建 → Trivy/SBOM → 推 Harbor → Cosign 签名/证明/验证。
# 依据 docs/总-部署架构设计.md §六:路径触发,frontend 各自流水线。
# 路径触发:前端源码/服务镜像或 node-builder 正式 digest 变化时运行;服务自身 digest 晋升不回环构建。
name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "images/service/frontend/**"
      - "images/image-digests.lock"
      - ".github/workflows/frontend.yml"
      - "deploy/ci/**"
  pull_request:
    paths:
      - "frontend/**"
      - "images/service/frontend/**"
      - "images/image-digests.lock"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  detect-image-build:
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.detect.outputs.required }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        name: 判断前端服务镜像是否需要重建
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-parse HEAD^)"
          fi
          source_changed=false
          if git diff --name-only "$base" HEAD | grep -Eq '^(frontend/|images/service/frontend/|\.github/workflows/frontend\.yml$|deploy/ci/)'; then
            source_changed=true
          fi
          previous_digest="$(git show "$base:images/image-digests.lock" 2>/dev/null | awk '$1 == "base/node-builder" { print $2 }')"
          current_digest="$(awk '$1 == "base/node-builder" { print $2 }' images/image-digests.lock)"
          if [[ -z "$current_digest" ]]; then
            echo "images/image-digests.lock 缺少 base/node-builder" >&2
            exit 1
          fi
          required=false
          if [[ "$source_changed" == "true" || "$previous_digest" != "$current_digest" ]]; then
            required=true
          fi
          echo "required=$required" >> "$GITHUB_OUTPUT"

  lint-build:
    needs: detect-image-build
    if: needs.detect-image-build.outputs.required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: 安装依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint + 类型检查
        working-directory: frontend
        run: |
          pnpm lint
          pnpm type-check
      - name: 构建四端静态资源
        working-directory: frontend
        run: pnpm build

  build-push:
    needs: [detect-image-build, lint-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-image-build.outputs.required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.1.1
      - id: build-base
        name: 读取前端不可变构建与运行基座
        shell: bash
        run: |
          set -euo pipefail
          digest="$(awk '$1 == "base/node-builder" { print $2 }' images/image-digests.lock)"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "images/image-digests.lock 缺少有效 base/node-builder digest" >&2
            exit 1
          fi
          echo "ref=${{ vars.HARBOR_REGISTRY }}/base/node-builder@$digest" >> "$GITHUB_OUTPUT"
          runtime="$(awk '
            /^upstream:[[:space:]]*$/ { inside=1; next }
            inside && /^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/ { inside=0 }
            inside && /^[[:space:]]+runtime:[[:space:]]*/ {
              sub("^[[:space:]]+runtime:[[:space:]]*", "");
              gsub(/^["'\''"]|["'\''"]$/, "");
              print; exit
            }
          ' images/service/frontend/manifest.yaml)"
          runtime_digest="$(awk '
            /^upstream:[[:space:]]*$/ { inside=1; next }
            inside && /^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/ { inside=0 }
            inside && /^[[:space:]]+runtime_digest:[[:space:]]*/ {
              sub("^[[:space:]]+runtime_digest:[[:space:]]*", "");
              gsub(/^["'\''"]|["'\''"]$/, "");
              print; exit
            }
          ' images/service/frontend/manifest.yaml)"
          if [[ -z "$runtime" || ! "$runtime_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "frontend manifest 缺少有效 upstream.runtime/runtime_digest" >&2
            exit 1
          fi
          echo "runtime=$runtime@$runtime_digest" >> "$GITHUB_OUTPUT"
      - name: 构建+扫描+签名+推送(frontend)
        id: frontend-image
        uses: ./deploy/ci/build-scan-sign-push
        with:
          image: ${{ vars.HARBOR_REGISTRY }}/service/frontend
          tag: ${{ github.sha }}
          context: .
          dockerfile: images/service/frontend/Dockerfile
          build-args: |
            NODE_BUILDER_IMAGE=${{ steps.build-base.outputs.ref }}
            NGINX_RUNTIME_IMAGE=${{ steps.build-base.outputs.runtime }}
          registry: ${{ vars.HARBOR_REGISTRY }}
          registry-username: ${{ secrets.HARBOR_USERNAME }}
          registry-password: ${{ secrets.HARBOR_PASSWORD }}
          cosign-key: ${{ secrets.COSIGN_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}
      - name: 写入前端服务 digest 片段
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p image-digest-artifacts
          printf '%s %s\n' 'service/frontend' '${{ steps.frontend-image.outputs.digest }}' > image-digest-artifacts/service-frontend.lock
      - name: 上传前端服务 digest 片段
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-frontend-service
          path: image-digest-artifacts/service-frontend.lock
