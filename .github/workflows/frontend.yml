# 前端镜像流水线:lint + 构建 → 镜像构建 → Trivy 扫描 → Cosign 签名 → 推 Harbor。
# 依据 docs/总-部署架构设计.md §六:路径触发,frontend 各自流水线。
# 路径触发:frontend/ 变更才跑(目录4 产出代码后激活)。
name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
      - "deploy/ci/**"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        working-directory: frontend
        run: npm ci
      - name: Lint + 类型检查
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck
      - name: 构建四端静态资源
        working-directory: frontend
        run: npm run build

  build-push:
    needs: lint-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3
      - name: 构建+扫描+签名+推送(frontend)
        uses: ./deploy/ci/build-scan-sign-push
        with:
          image: ${{ secrets.HARBOR_REGISTRY }}/service/frontend
          tag: ${{ github.sha }}
          context: frontend
          dockerfile: frontend/Dockerfile
          registry: ${{ secrets.HARBOR_REGISTRY }}
          registry-username: ${{ secrets.HARBOR_USERNAME }}
          registry-password: ${{ secrets.HARBOR_PASSWORD }}
          cosign-key: ${{ secrets.COSIGN_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}
