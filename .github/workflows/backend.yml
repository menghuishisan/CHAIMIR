# 后端镜像流水线:lint + 单测 → 构建 → Trivy 扫描 → Cosign 签名 → 推 Harbor。
# 依据 docs/总-部署架构设计.md §六:路径触发,backend 各自流水线。
# 路径触发:backend/ 变更才跑(目录2 产出代码后激活)。
name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "images/service/backend/**"
      - "images/service/migrate/**"
      - "images/image-digests.lock"
      - ".github/workflows/backend.yml"
      - "deploy/ci/**"
  pull_request:
    paths:
      - "backend/**"
      - "images/service/backend/**"
      - "images/service/migrate/**"
      - "images/image-digests.lock"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  detect-image-build:
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.detect.outputs.required }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        name: 判断后端服务镜像是否需要重建
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-parse HEAD^)"
          fi
          source_changed=false
          if git diff --name-only "$base" HEAD | grep -Eq '^(backend/|images/service/(backend|migrate)/|\.github/workflows/backend\.yml$|deploy/ci/)'; then
            source_changed=true
          fi
          previous_digest="$(git show "$base:images/image-digests.lock" 2>/dev/null | awk '$1 == "base/go-builder" { print $2 }')"
          current_digest="$(awk '$1 == "base/go-builder" { print $2 }' images/image-digests.lock)"
          if [[ -z "$current_digest" ]]; then
            echo "images/image-digests.lock 缺少 base/go-builder" >&2
            exit 1
          fi
          required=false
          if [[ "$source_changed" == "true" || "$previous_digest" != "$current_digest" ]]; then
            required=true
          fi
          echo "required=$required" >> "$GITHUB_OUTPUT"

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: 静态检查(go vet + golangci-lint)
        working-directory: backend
        run: |
          go vet ./...
          go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./... || true
      - name: 单元测试(含 RLS 越权用例)
        working-directory: backend
        run: go test ./... -race -count=1

  build-push:
    # 仅 main 推送且测试通过后构建推送(PR 只验证不推送)。
    needs: [detect-image-build, lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-image-build.outputs.required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3
      - id: build-base
        name: 读取 Go 构建基座 digest
        shell: bash
        run: |
          set -euo pipefail
          digest="$(awk '$1 == "base/go-builder" { print $2 }' images/image-digests.lock)"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "images/image-digests.lock 缺少有效 base/go-builder digest" >&2
            exit 1
          fi
          echo "ref=${{ secrets.HARBOR_REGISTRY }}/base/go-builder@$digest" >> "$GITHUB_OUTPUT"
      - name: 构建+扫描+签名+推送(backend)
        id: backend-image
        uses: ./deploy/ci/build-scan-sign-push
        with:
          image: ${{ secrets.HARBOR_REGISTRY }}/service/backend
          tag: ${{ github.sha }}
          context: .
          dockerfile: images/service/backend/Dockerfile
          build-args: |
            GO_BUILDER_IMAGE=${{ steps.build-base.outputs.ref }}
          registry: ${{ secrets.HARBOR_REGISTRY }}
          registry-username: ${{ secrets.HARBOR_USERNAME }}
          registry-password: ${{ secrets.HARBOR_PASSWORD }}
          cosign-key: ${{ secrets.COSIGN_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}
      - name: 构建+扫描+签名+推送(migrate)
        id: migrate-image
        uses: ./deploy/ci/build-scan-sign-push
        with:
          image: ${{ secrets.HARBOR_REGISTRY }}/service/migrate
          tag: ${{ github.sha }}
          context: .
          dockerfile: images/service/migrate/Dockerfile
          build-args: |
            GO_BUILDER_IMAGE=${{ steps.build-base.outputs.ref }}
          registry: ${{ secrets.HARBOR_REGISTRY }}
          registry-username: ${{ secrets.HARBOR_USERNAME }}
          registry-password: ${{ secrets.HARBOR_PASSWORD }}
          cosign-key: ${{ secrets.COSIGN_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}
      - name: 写入后端服务 digest 片段
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p image-digest-artifacts
          printf '%s %s\n' 'service/backend' '${{ steps.backend-image.outputs.digest }}' > image-digest-artifacts/service-backend.lock
          printf '%s %s\n' 'service/migrate' '${{ steps.migrate-image.outputs.digest }}' > image-digest-artifacts/service-migrate.lock
      - name: 上传后端服务 digest 片段
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-backend-services
          path: image-digest-artifacts/*.lock
