# 部署流水线:消费已验证 digest 自动部署 staging;打 tag→人工审批→按权威锁部署 prod-saas。
# 依据 docs/总-部署架构设计.md §六:
#   已验证 digest 的机器人 PR 合入 main → 按权威锁自动部署 staging;
#   打 tag → 按发布提交权威锁中的 digest 人工审批后部署 prod-saas;
#   私有化 → 生成离线镜像包 + 部署清单交付(见 deploy/Makefile / scripts,目录5)。
name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "images/image-digests.lock"

permissions:
  contents: read

jobs:
  # main 分支:权威锁变更后一次部署同一批已验证服务 digest。
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging  # GitHub Environment(可配审批/保护规则)。
    steps:
      - uses: actions/checkout@v4
      - name: 配置 kubeconfig(staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config
      - name: 从权威锁生成 staging digest overlay
        shell: pwsh
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
        run: |
          ./deploy/scripts/render-locked-overlay.ps1 `
            -OverlayPath ./deploy/overlays/staging `
            -Registry $env:HARBOR_REGISTRY `
            -OutputPath "$env:RUNNER_TEMP/staging/kustomization.yaml"
      - name: 应用 staging digest overlay
        run: |
          set -euo pipefail
          kubectl kustomize "$RUNNER_TEMP/staging" --load-restrictor LoadRestrictionsNone | kubectl apply -f -
          kubectl -n chaimir-system rollout status deployment/chaimir-backend --timeout=300s
          kubectl -n chaimir-system rollout status deployment/chaimir-frontend --timeout=300s

  # 打 tag:人工审批后部署 prod-saas。
  deploy-prod-saas:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-saas  # 该 Environment 配置必需审批人(人工审批门禁)。
    steps:
      - uses: actions/checkout@v4
      - name: 配置 kubeconfig(prod-saas)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD_SAAS }}" > ~/.kube/config
      - name: 从发布提交权威锁生成 prod-saas digest overlay
        shell: pwsh
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
        run: |
          ./deploy/scripts/render-locked-overlay.ps1 `
            -OverlayPath ./deploy/overlays/prod-saas `
            -Registry $env:HARBOR_REGISTRY `
            -OutputPath "$env:RUNNER_TEMP/prod-saas/kustomization.yaml"
      - name: 应用 prod-saas digest overlay
        run: |
          set -euo pipefail
          kubectl kustomize "$RUNNER_TEMP/prod-saas" --load-restrictor LoadRestrictionsNone | kubectl apply -f -
          kubectl -n chaimir-system rollout status deployment/chaimir-backend --timeout=600s
          kubectl -n chaimir-system rollout status deployment/chaimir-frontend --timeout=600s
