# 镜像流水线:链运行时/工具/判题器/仿真/基础镜像(数据驱动,目录3 产出)。
# 依据 docs/总-部署架构设计.md §六 + docs/总-镜像与容器设计.md:
#   images/ 各镜像含 Dockerfile + manifest.yaml;矩阵构建 → 扫描 → 签名 → 推 Harbor。
# 路径触发:images/ 变更才跑(目录3 产出后激活)。
name: images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/images.yml"
      - "deploy/ci/**"
  pull_request:
    paths:
      - "images/**"
      - ".github/workflows/images.yml"

permissions:
  contents: read

jobs:
  # 发现变更的镜像目录(每个镜像目录含 Dockerfile + manifest.yaml)。
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        name: 收集 images/ 下含 Dockerfile 的镜像目录
        run: |
          # 输出 {dir, image} 矩阵:dir 为镜像目录,image 由目录相对路径映射为 Harbor project/name。
          # 例:images/runtimes/evm-hardhat → runtime/evm-hardhat。
          dirs=$(find images -name Dockerfile -printf '%h\n' | sort -u | grep -v '^images/service/' || true)
          json='[]'
          for d in $dirs; do
            rel=${d#images/}
            json=$(echo "$json" | jq --arg d "$d" --arg r "$rel" '. + [{dir:$d, rel:$r}]')
          done
          echo "matrix={\"include\":$json}" >> "$GITHUB_OUTPUT"

  build-push:
    needs: discover
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3
      - name: 解析 manifest 镜像名
        id: meta
        run: |
          # 镜像逻辑名取自 manifest.yaml(数据驱动:平台代码不改,加镜像即接入)。
          name=$(yq '.image' "${{ matrix.dir }}/manifest.yaml")
          safe=${name//\//-}
          echo "logical=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.HARBOR_REGISTRY }}/$name" >> "$GITHUB_OUTPUT"
      - name: 构建+扫描+签名+推送
        id: build
        uses: ./deploy/ci/build-scan-sign-push
        with:
          image: ${{ steps.meta.outputs.image }}
          tag: ${{ github.sha }}
          context: ${{ matrix.dir }}
          dockerfile: ${{ matrix.dir }}/Dockerfile
          registry: ${{ secrets.HARBOR_REGISTRY }}
          registry-username: ${{ secrets.HARBOR_USERNAME }}
          registry-password: ${{ secrets.HARBOR_PASSWORD }}
          cosign-key: ${{ secrets.COSIGN_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}
      - name: 写入构建产物 digest 锁片段
        run: |
          mkdir -p image-digest-artifacts
          printf '%s %s\n' "${{ steps.meta.outputs.logical }}" "${{ steps.build.outputs.digest }}" > "image-digest-artifacts/${{ steps.meta.outputs.safe }}.lock"
      - name: 上传构建产物 digest 锁片段
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ steps.meta.outputs.safe }}
          path: image-digest-artifacts/${{ steps.meta.outputs.safe }}.lock

  merge-digest-lock:
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载镜像 digest 锁片段
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: image-digest-artifacts
          merge-multiple: true
      - name: 合并完整 image-digests.lock
        run: |
          set -euo pipefail
          mkdir -p images
          if ! find image-digest-artifacts -name '*.lock' -type f | grep -q .; then
            echo "未找到镜像 digest 锁片段" >&2
            exit 1
          fi

          cat image-digest-artifacts/*.lock | tr -d '\r' | sed '/^[[:space:]]*$/d' | sort > images/image-digests.lock
          awk '
            NF != 2 || $2 !~ /^sha256:[0-9a-f]{64}$/ {
              printf("digest 锁格式非法: %s\n", $0) > "/dev/stderr";
              exit 1;
            }
            seen[$1] && seen[$1] != $2 {
              printf("镜像 %s 存在多个 digest: %s / %s\n", $1, seen[$1], $2) > "/dev/stderr";
              exit 1;
            }
            { seen[$1] = $2 }
          ' images/image-digests.lock
      - name: 上传完整 image-digests.lock
        uses: actions/upload-artifact@v4
        with:
          name: image-digests-lock
          path: images/image-digests.lock
