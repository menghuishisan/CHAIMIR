# 本文件声明 tool/theia 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: theia
image: tool/theia
labels:
  app.kubernetes.io/name: theia
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/theia
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Theia 轻量 Web IDE 镜像。
source:
  type: thin-wrapper
upstream:
  image: theiaide/theia:1.54.0
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - web-ide
  - code-editing
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  mount_workspace: true
ports:
  - name: http
    container_port: 3000
    protocol: TCP
    expose: proxy
    purpose: Theia Web IDE
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_THEIA_PORT
      default: 13000
      container_port: 3000
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Theia 需要写插件、设置和临时缓存;仅允许写入 workspace 与工具缓存卷。
    writable_mounts:
      - workspace
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 150m
  cpu_limit: "1"
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/tool/theia
  dockerfile: Dockerfile
selftest:
  commands:
    - name: node-version
      command:
        - node
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

