# 本文件声明 tool/db-viewer 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: db-viewer
image: tool/db-viewer
labels:
  app.kubernetes.io/name: db-viewer
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/db-viewer
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: 状态数据库可视化工具镜像。
source:
  type: thin-wrapper
upstream:
  image: sosedoff/pgweb:0.16.2
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - database-viewer
  - state-inspection
tool:
  kind: web-embed
  eco_tags:
    - fabric
    - evm
  mount_workspace: false
  runtime_config_required: false
  resource_spec:
    components:
      - name: web
        image_url: "@self"
        command:
          - pgweb
        args:
          - --bind=0.0.0.0
          - --listen=8081
          - --url=postgres://student@tool-db-viewer-postgres:5432/student_state?sslmode=disable
          - --open-retry=60
          - --open-retry-delay=2
        ports:
          - name: http
            container_port: 8081
            service_port: 8081
            protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readiness_probe:
          type: http
          path: /
          port: http
          period_seconds: 2
          failure_threshold: 30
        read_only_root_filesystem: false
        mount_workspace: false
      - name: postgres
        image_url: "@image:infra/postgres-graph"
        env:
          - name: POSTGRES_DB
            value: student_state
          - name: POSTGRES_USER
            value: student
          - name: POSTGRES_HOST_AUTH_METHOD
            value: trust
          - name: PGDATA
            value: /tmp/db-viewer-postgres
        ports:
          - name: postgres
            container_port: 5432
            service_port: 5432
            protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        readiness_probe:
          type: tcp
          port: postgres
          period_seconds: 2
          failure_threshold: 60
        read_only_root_filesystem: false
        mount_workspace: false
        ephemeral_mounts:
          - name: db-viewer-postgres-data
            mount_path: /tmp
    services:
      - name: tool-db-viewer-web
        component: web
        ports:
          - name: http
            port: 8081
            target_port: http
            protocol: TCP
      - name: tool-db-viewer-postgres
        component: postgres
        ports:
          - name: postgres
            port: 5432
            target_port: postgres
            protocol: TCP
    routes:
      - path_prefix: /
        service: tool-db-viewer-web
        port: http
    network_rules:
      - name: db-viewer-postgres
        from: web
        to: postgres
        ports:
          - name: postgres
ports:
  - name: http
    container_port: 8081
    protocol: TCP
    expose: proxy
    purpose: Database viewer web UI
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_DB_VIEWER_PORT
      default: 18099
      container_port: 8081
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: 数据库可视化工具需要写会话临时文件;仅允许写入工具缓存卷。
    writable_mounts:
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - public-assets
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 1Gi
build:
  context: images/tool/db-viewer
  dockerfile: Dockerfile
selftest:
  commands:
    - name: pgweb-version
      command:
        - pgweb
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

