# 本文件声明 tool/jupyter 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: jupyter
image: tool/jupyter
labels:
  app.kubernetes.io/name: jupyter
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/jupyter
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Python Notebook 数据分析工具镜像。
source:
  type: thin-wrapper
upstream:
  image: quay.io/jupyter/minimal-notebook:python-3.12
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - notebook
  - data-analysis
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  mount_workspace: true
  ephemeral_mounts:
    - name: jupyter-local
      mount_path: /home/jovyan/.local
    - name: jupyter-cache
      mount_path: /home/jovyan/.cache
    - name: jupyter-config
      mount_path: /home/jovyan/.jupyter
    - name: jupyter-ipython
      mount_path: /home/jovyan/.ipython
    - name: jupyter-tmp
      mount_path: /tmp
auth:
  delegated_to_platform: true
  reason: Notebook 内置 token/password 关闭,外部入口必须经平台代理按租户和环境鉴权。
ports:
  - name: http
    container_port: 8888
    protocol: TCP
    expose: proxy
    purpose: Jupyter Notebook
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_JUPYTER_PORT
      default: 18888
      container_port: 8888
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: writable_mounts
    reason: Jupyter 需要写内核连接文件和运行缓存;根文件系统保持只读,仅挂载平台声明的工具临时卷。
    writable_mounts:
      - workspace
      - /home/jovyan/.local
      - /home/jovyan/.cache
      - /home/jovyan/.jupyter
      - /home/jovyan/.ipython
      - /tmp
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/tool/jupyter
  dockerfile: Dockerfile
selftest:
  commands:
    - name: jupyter-version
      command:
        - jupyter
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
