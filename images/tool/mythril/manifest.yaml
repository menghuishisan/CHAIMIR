# 本文件声明 tool/mythril 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: mythril
image: tool/mythril
labels:
  app.kubernetes.io/name: mythril
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/mythril
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: Mythril 符号执行漏洞检测工具镜像。
source:
  type: platform-built
upstream:
  package: mythril
  version: "0.24.8"
  source_repository: https://github.com/ConsenSysDiligence/mythril
  runtime: cgr.dev/chainguard/wolfi-base
  reuse_policy: pypi-source-build
data_driven: true
capabilities:
  - security-scan
  - symbolic-execution
tool:
  kind: command-tool
  eco_tags:
    - evm
  mount_workspace: true
  keepalive_command:
    - sleep
    - "2147483647"
  command_policy:
    allowed_commands:
      - myth
    default_timeout_seconds: 120
    max_timeout_seconds: 300
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Mythril 符号执行需要写临时缓存和分析结果;仅允许写入 workspace 与工具缓存卷。
    writable_mounts:
      - workspace
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 4Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/tool/mythril
  dockerfile: Dockerfile
selftest:
  commands:
    - name: myth-version
      command:
        - myth
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

