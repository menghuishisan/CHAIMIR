# 本文件声明 tool/contract-ui 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: contract-ui
image: tool/contract-ui
labels:
  app.kubernetes.io/name: contract-ui
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/contract-ui
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: 合约 ABI 交互面板工具镜像。
source:
  type: platform-built
upstream:
  image: python:3.13-alpine
  reuse_policy: self-developed-tool
data_driven: true
capabilities:
  - contract-ui
  - abi-form
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
  mount_workspace: true
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Contract UI API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_CONTRACT_UI_PORT
      default: 18097
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/tool/contract-ui
  dockerfile: Dockerfile
selftest:
  commands:
    - name: syntax
      command:
        - python
        - -m
        - py_compile
        - /app/contract_ui.py
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

