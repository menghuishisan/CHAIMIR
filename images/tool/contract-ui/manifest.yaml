# 本文件声明 tool/contract-ui 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: contract-ui
image: tool/contract-ui
labels:
  app.kubernetes.io/name: contract-ui
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/contract-ui
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: 合约 ABI 交互面板工具镜像。
source:
  type: platform-built
upstream:
  image: cgr.dev/chainguard/wolfi-base:latest
  packages:
    - python-3.13
    - eth-abi==5.2.0
    - eth-utils==5.3.1
    - eth-hash[pycryptodome]==0.8.0
  reuse_policy: self-developed-tool
env_keys:
  config:
    - CHAIMIR_IMAGE_PORT
    - CHAIMIR_MAX_BODY_BYTES
  secret: []
data_driven: true
capabilities:
  - contract-ui
  - abi-form
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
  mount_workspace: true
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Contract UI API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_CONTRACT_UI_PORT
      default: 18097
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/tool/contract-ui
  dockerfile: Dockerfile
selftest:
  commands:
    - name: calldata-generation
      command:
        - python
        - -c
        - "import importlib.util; spec=importlib.util.spec_from_file_location('contract_ui','/app/contract_ui.py'); m=importlib.util.module_from_spec(spec); spec.loader.exec_module(m); abi=[{'type':'function','name':'transfer','inputs':[{'name':'to','type':'address'},{'name':'amount','type':'uint256'}]}]; r=m.build_call_data(abi,'transfer',['0x0000000000000000000000000000000000000001',5]); assert r['calldata'].startswith('0xa9059cbb')"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
