# 本文件声明 tool/blockscout 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: blockscout
image: tool/blockscout
labels:
  app.kubernetes.io/name: blockscout
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/blockscout
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: EVM 区块链浏览器镜像。
source:
  type: thin-wrapper
upstream:
  image: blockscout/blockscout:6.9.2
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-explorer
  - evm-browser
tool:
  kind: web-embed
  eco_tags:
    - evm
  mount_workspace: false
  runtime_config_required: true
  resource_spec:
    components:
      - name: web
        image_url: "@self"
        command:
          - /usr/local/bin/chaimir-blockscout-entrypoint
        env:
          - name: DATABASE_URL
            value: postgresql://postgres:postgres@runtime-sandbox:5432/blockscout
          - name: ETHEREUM_JSONRPC_HTTP_URL
            value: http://runtime-sandbox:8545
          - name: ETHEREUM_JSONRPC_TRACE_URL
            value: http://runtime-sandbox:8545
          - name: ETHEREUM_JSONRPC_VARIANT
            value: geth
          - name: ECTO_USE_SSL
            value: "false"
          - name: PORT
            value: "4000"
          - name: DISABLE_EXCHANGE_RATES
            value: "true"
          - name: INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER
            value: "true"
          - name: BLOCKSCOUT_DEPENDENCY_TIMEOUT_SECONDS
            value: "180"
          - name: BLOCKSCOUT_DEPENDENCY_POLL_SECONDS
            value: "2"
        ports:
          - name: http
            container_port: 4000
            service_port: 4000
            protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 3Gi
        readiness_probe:
          type: http
          path: /
          port: http
          period_seconds: 2
          failure_threshold: 90
        read_only_root_filesystem: false
        mount_workspace: false
        ephemeral_mounts:
          - name: blockscout-tmp
            mount_path: /tmp
          - name: blockscout-cache
            mount_path: /tmp/blockscout
    services:
      - name: tool-blockscout-web
        component: web
        ports:
          - name: http
            port: 4000
            target_port: http
            protocol: TCP
    routes:
      - path_prefix: /
        service: tool-blockscout-web
        port: http
    network_rules:
      - name: blockscout-runtime-rpc
        from: web
        to: sandbox
        ports:
          - name: rpc
      - name: blockscout-runtime-postgres
        from: web
        to: sandbox
        ports:
          - name: postgres
ports:
  - name: http
    container_port: 4000
    protocol: TCP
    expose: proxy
    purpose: Blockscout explorer
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_BLOCKSCOUT_PORT
      default: 14000
      container_port: 4000
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Blockscout 上游运行时需要写应用临时文件;业务数据必须写入独立数据库或工具缓存卷。
    writable_mounts:
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - public-assets
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 3Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/tool/blockscout
  dockerfile: Dockerfile
selftest:
  commands:
    - name: image-layout
      command:
        - sh
        - -lc
        - "test -x /usr/local/bin/chaimir-blockscout-entrypoint && /app/bin/blockscout version"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

