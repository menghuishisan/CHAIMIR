# 本文件声明 tool/gas-profiler 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: gas-profiler
image: tool/gas-profiler
labels:
  app.kubernetes.io/name: gas-profiler
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/gas-profiler
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: gas 消耗分析命令行工具镜像。
source:
  type: platform-built
upstream:
  image: python:3.13-alpine
  reuse_policy: self-developed-tool
data_driven: true
capabilities:
  - gas-analysis
  - contract-profiling
tool:
  kind: command-tool
  eco_tags:
    - evm
  mount_workspace: true
  keepalive_command:
    - sleep
    - "2147483647"
  command_policy:
    allowed_commands:
      - gas-profiler
    default_timeout_seconds: 60
    max_timeout_seconds: 180
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/tool/gas-profiler
  dockerfile: Dockerfile
selftest:
  commands:
    - name: syntax
      command:
        - python
        - -m
        - py_compile
        - /usr/local/bin/gas-profiler
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

