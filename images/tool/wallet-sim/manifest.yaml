# 本文件声明 tool/wallet-sim 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: wallet-sim
image: tool/wallet-sim
labels:
  app.kubernetes.io/name: wallet-sim
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/wallet-sim
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: 钱包模拟器工具镜像。
source:
  type: platform-built
upstream:
  image: cgr.dev/chainguard/wolfi-base:latest
  packages:
    - python-3.13
    - eth-account==0.13.7
  reuse_policy: self-developed-tool
env_keys:
  config:
    - CHAIMIR_IMAGE_PORT
    - CHAIMIR_MAX_BODY_BYTES
  secret: []
data_driven: true
capabilities:
  - wallet-simulator
  - transaction-signing
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
  mount_workspace: true
  readiness_path: /healthz
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Wallet simulator API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_WALLET_SIM_PORT
      default: 18096
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/tool/wallet-sim
  dockerfile: Dockerfile
selftest:
  commands:
    - name: wallet-signature
      command:
        - python
        - -c
        - "import importlib.util; spec=importlib.util.spec_from_file_location('wallet_sim','/app/wallet_sim.py'); m=importlib.util.module_from_spec(spec); spec.loader.exec_module(m); r=m.sign_message('chaimir-selftest'); assert r['address'].lower()==r['recovered_address'].lower(); assert r['signature'].startswith('0x')"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
