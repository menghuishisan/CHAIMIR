# 本文件声明 tool/code-server 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: code-server
image: tool/code-server
labels:
  app.kubernetes.io/name: code-server
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/code-server
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: VS Code Web 编辑器镜像。
source:
  type: thin-wrapper
upstream:
  image: codercom/code-server:4.101.1
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - web-ide
  - code-editing
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  mount_workspace: true
  ephemeral_mounts:
    - name: code-server-config
      mount_path: /home/coder/.config
    - name: code-server-data
      mount_path: /home/coder/.local/share/code-server
auth:
  delegated_to_platform: true
  reason: Web IDE 内置认证关闭,外部入口必须经平台代理按租户和环境鉴权。
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Web IDE
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_CODE_SERVER_PORT
      default: 18085
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: writable_mounts
    reason: code-server 需要写用户配置和运行数据;根文件系统保持只读,仅挂载平台声明的工具临时卷。
    writable_mounts:
      - workspace
      - /home/coder/.config
      - /home/coder/.local/share/code-server
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 150m
  cpu_limit: "1"
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/tool/code-server
  dockerfile: Dockerfile
selftest:
  commands:
    - name: code-server-version
      command:
        - code-server
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


