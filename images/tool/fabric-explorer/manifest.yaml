# 本文件声明 tool/fabric-explorer 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: fabric-explorer
image: tool/fabric-explorer
labels:
  app.kubernetes.io/name: fabric-explorer
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/fabric-explorer
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Fabric 区块链浏览器镜像。
source:
  type: thin-wrapper
upstream:
  image: hyperledger/explorer:1.1.8
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-explorer
  - fabric-browser
tool:
  kind: web-embed
  eco_tags:
    - fabric
  mount_workspace: false
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Fabric explorer web UI
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_FABRIC_EXPLORER_PORT
      default: 18095
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Fabric Explorer 上游服务需要写连接缓存和运行临时文件;仅允许写入工具缓存卷。
    writable_mounts:
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - public-assets
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/tool/fabric-explorer
  dockerfile: Dockerfile
selftest:
  commands:
    - name: explorer-layout
      command:
        - sh
        - -lc
        - "test -d /opt/explorer || test -d /app"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

