# 本文件声明 tool/fabric-explorer 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: fabric-explorer
image: tool/fabric-explorer
labels:
  app.kubernetes.io/name: fabric-explorer
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/fabric-explorer
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Fabric 区块链浏览器镜像。
source:
  type: thin-wrapper
upstream:
  image: hyperledger/explorer:1.1.8
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-explorer
  - fabric-browser
tool:
  kind: web-embed
  eco_tags:
    - fabric
  mount_workspace: false
  runtime_config_required: true
  resource_spec:
    components:
      - name: web
        image_url: "@self"
        ports:
          - name: http
            container_port: 8080
            service_port: 8080
            protocol: TCP
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        readiness_probe:
          type: http
          path: /
          port: http
          period_seconds: 2
          failure_threshold: 60
        read_only_root_filesystem: true
        mount_workspace: false
        ephemeral_mounts:
          - name: tmp
            mount_path: /tmp
          - name: logs
            mount_path: /opt/explorer/logs
          - name: walletstore
            mount_path: /opt/explorer/walletstore
          - name: npm-cache
            mount_path: /home/node/.npm
    services:
      - name: tool-fabric-explorer-web
        component: web
        ports:
          - name: http
            port: 8080
            target_port: http
            protocol: TCP
    routes:
      - path_prefix: /
        service: tool-fabric-explorer-web
        port: http
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Fabric explorer web UI
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_FABRIC_EXPLORER_PORT
      default: 18095
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - public-assets
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/tool/fabric-explorer
  dockerfile: Dockerfile
selftest:
  commands:
    - name: explorer-layout
      command:
        - sh
        - -lc
        - "test -d /opt/explorer || test -d /app"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
  deployable: false
  block_reason: "2026-06-28 使用 Trivy 0.71.2 扫描当前 hyperledger/explorer:1.1.8 薄封装产物仍存在 21 个 CRITICAL 与 155 个 HIGH;官方 Hyperledger Explorer v2.0.0 源码存在 22 个 CRITICAL 与 200 个 HIGH 且官方仓库已归档。已排查 FabEx 与 Fabric-X Block Explorer:FabEx 更接近标准 Fabric 浏览器但依赖 MongoDB 且源码扫描仍有 1 个 CRITICAL 与 38 个 HIGH;Fabric-X Block Explorer 需要 Fabric-X sidecar,不是标准 Fabric connection profile/证书模型的等价替换,源码扫描仍有 1 个 CRITICAL 与 38 个 HIGH。在官方安全版本、可验证源码重建或完整契约适配且通过门禁的替代组件前不得 seed 为可调度。"

