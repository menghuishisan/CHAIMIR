# 本文件声明 tool/slither 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: slither
image: tool/slither
labels:
  app.kubernetes.io/name: slither
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/slither
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Solidity 静态安全扫描工具镜像。
source:
  type: thin-wrapper
upstream:
  image: trailofbits/eth-security-toolbox:2024.12.0
  reuse_policy: direct-upstream-wrapper
data_driven: true
capabilities:
  - security-scan
  - solidity-static-analysis
tool:
  kind: cli
  eco_tags:
    - evm
  mount_workspace: true
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Slither 及编译器缓存需要写临时分析目录;仅允许写入 workspace 与工具缓存卷。
    writable_mounts:
      - workspace
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 150m
  cpu_limit: "1"
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/tool/slither
  dockerfile: Dockerfile
selftest:
  commands:
    - name: slither-version
      command:
        - slither
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


