# 本文件声明 tool/remix 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: remix
image: tool/remix
labels:
  app.kubernetes.io/name: remix
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/remix
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Remix Solidity Web IDE 镜像。
source:
  type: thin-wrapper
upstream:
  image: remixproject/remix-ide:2.0.0
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - solidity-ide
  - contract-deploy
tool:
  kind: web-embed
  eco_tags:
    - evm
  mount_workspace: true
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: Remix Web IDE
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_REMIX_PORT
      default: 18094
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Remix 静态服务上游镜像需要写 Web 服务临时文件;仅允许写入工具缓存卷。
    writable_mounts:
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 1Gi
build:
  context: images/tool/remix
  dockerfile: Dockerfile
selftest:
  commands:
    - name: web-root
      command:
        - sh
        - -lc
        - "test -d /usr/share/nginx/html || test -d /app"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

