# 本文件声明 tool/novnc-desktop 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: tool
name: novnc-desktop
image: tool/novnc-desktop
labels:
  app.kubernetes.io/name: novnc-desktop
  app.kubernetes.io/component: tool
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: tool
  chaimir.io/image: tool/novnc-desktop
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-tool
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: noVNC 图形桌面工具镜像。
source:
  type: thin-wrapper
upstream:
  image: dorowu/ubuntu-desktop-lxde-vnc:focal
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - remote-desktop
  - gui-tooling
tool:
  kind: web-embed
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  mount_workspace: true
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: noVNC web desktop
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_NOVNC_PORT
      default: 18098
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: 图形桌面需要写会话、X11 和 VNC 临时文件;仅允许写入 workspace 与工具缓存卷。
    writable_mounts:
      - workspace
      - tool-cache
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 3Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/tool/novnc-desktop
  dockerfile: Dockerfile
selftest:
  commands:
    - name: desktop-layout
      command:
        - sh
        - -lc
        - "test -d /workspace"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

