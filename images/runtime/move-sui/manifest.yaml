# 本文件声明 runtime/move-sui 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: runtime
name: move-sui
image: runtime/move-sui
labels:
  app.kubernetes.io/name: move-sui
  app.kubernetes.io/component: runtime
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: runtime
  chaimir.io/image: runtime/move-sui
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: student-runtime
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Sui Move 本地网教学运行时镜像。
source:
  type: thin-wrapper
upstream:
  image: mysten/sui-tools:086c222823a48f5136eedf969e9d489dc265e714
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-runtime
  - sui-localnet
  - move-dev
runtime:
  eco: sui
  adapter_level: 2
  default_tool_codes:
    - code-server
ports:
  - name: rpc
    container_port: 9000
    protocol: TCP
    expose: proxy
    purpose: Sui RPC
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_SUI_RPC_PORT
      default: 19000
      container_port: 9000
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
  shell: none
  allowed_mounts: []
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 4Gi
  ephemeral_storage_limit: 8Gi
build:
  context: images/runtime/move-sui
  dockerfile: Dockerfile
selftest:
  commands:
    - name: sui-version
      command:
        - sui
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

