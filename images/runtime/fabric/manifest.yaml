# 本文件声明 runtime/fabric 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: runtime
name: fabric
image: runtime/fabric
labels:
  app.kubernetes.io/name: fabric
  app.kubernetes.io/component: runtime
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: runtime
  chaimir.io/image: runtime/fabric
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: student-runtime
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Hyperledger Fabric 工具运行时镜像。
source:
  type: thin-wrapper
upstream:
  image: hyperledger/fabric-tools:2.5.16
  digest: sha256:760022c3eed97e83dd7a2e1a04b68d04ece3675988063e9dbdc7b0b993a8d95a
  rebuild_image: base/fabric-tools
  runtime_image: ubuntu:22.04
  runtime_digest: sha256:0e0a0fc6d18feda9db1590da249ac93e8d5abfea8f4c3c0c849ce512b5ef8982
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-runtime
  - fabric-peer-orderer-ca
  - chaincode-dev
runtime:
  eco: fabric
  adapter_level: 2
  default_tool_codes:
    - code-server
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
  shell: none
  allowed_mounts: []
resources:
  cpu_request: 250m
  cpu_limit: "2"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/runtime/fabric
  dockerfile: Dockerfile
selftest:
  commands:
    - name: fabric-peer-version
      command:
        - peer
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


