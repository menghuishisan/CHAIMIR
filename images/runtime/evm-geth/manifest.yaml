# 本文件声明 runtime/evm-geth 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: runtime
name: evm-geth
image: runtime/evm-geth
labels:
  app.kubernetes.io/name: evm-geth
  app.kubernetes.io/component: runtime
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: runtime
  chaimir.io/image: runtime/evm-geth
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "true"
  chaimir.io/sensitivity: student-runtime
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: go-ethereum 私链运行时镜像。
source:
  type: thin-wrapper
upstream:
  image: ethereum/client-go:v1.16.2
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-runtime
  - evm-json-rpc
  - geth-private-chain
runtime:
  eco: evm
  adapter_level: 2
  default_tool_codes:
    - terminal
    - code-server
    - blockscout
ports:
  - name: rpc
    container_port: 8545
    protocol: TCP
    expose: proxy
    purpose: EVM JSON-RPC
rpc_exposure:
  bind_all_interfaces: true
  reason: 容器内 RPC 监听 0.0.0.0,仅允许 M2 生成的 Service/Gateway 暴露。
  allowed_apis:
    - eth
    - net
    - web3
    - debug
    - txpool
  required_controls:
    - network_policy_deny_all
    - platform_authenticated_proxy
    - no_direct_student_shell_to_rpc_admin
    - m2_port_allowlist
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_EVM_GETH_RPC_PORT
      default: 18546
      container_port: 8545
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: true
  shell: restricted
  allowed_mounts:
    - workspace
    - public-assets
    - runtime-state
resources:
  cpu_request: 250m
  cpu_limit: "2"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/runtime/evm-geth
  dockerfile: Dockerfile
selftest:
  commands:
    - name: geth-version
      command:
        - geth
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


