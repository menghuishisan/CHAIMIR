# 本文件声明 runtime/bitcoin 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: runtime
name: bitcoin
image: runtime/bitcoin
labels:
  app.kubernetes.io/name: bitcoin
  app.kubernetes.io/component: runtime
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: runtime
  chaimir.io/image: runtime/bitcoin
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: student-runtime
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Bitcoin regtest 教学运行时镜像。
source:
  type: thin-wrapper
upstream:
  image: ruimarinho/bitcoin-core:24-alpine
  digest: sha256:258f763357e610f7d87c4898211878fc78d2452edcd5897f65843cbcd2940d5f
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-runtime
  - bitcoin-regtest
  - utxo-dev
runtime:
  eco: bitcoin
  adapter_level: 2
  default_tool_codes:
    - code-server
ports:
  - name: rpc
    container_port: 18443
    protocol: TCP
    expose: proxy
    purpose: Bitcoin regtest RPC
rpc_exposure:
  bind_all_interfaces: true
  reason: bitcoind regtest RPC 只在沙箱网络内监听,外部入口必须由 M2 鉴权代理生成。
  unsafe_flags:
    - -rpcallowip=0.0.0.0/0
  required_controls:
    - network_policy_deny_all
    - platform_authenticated_proxy
    - no_direct_student_shell_to_rpc_admin
    - m2_port_allowlist
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_BITCOIN_RPC_PORT
      default: 18443
      container_port: 18443
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
  shell: none
  allowed_mounts: []
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 8Gi
build:
  context: images/runtime/bitcoin
  dockerfile: Dockerfile
selftest:
  commands:
    - name: bitcoin-version
      command:
        - bitcoind
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

