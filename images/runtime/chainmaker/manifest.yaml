# 本文件声明 runtime/chainmaker 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: runtime
name: chainmaker
image: runtime/chainmaker
labels:
  app.kubernetes.io/name: chainmaker
  app.kubernetes.io/component: runtime
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: runtime
  chaimir.io/image: runtime/chainmaker
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: student-runtime
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: 长安链教学运行时镜像。
source:
  type: platform-built
upstream:
  image: chainmaker-go-source
  version: v2.3.8
  source_archive: images/vendor/chainmaker/chainmaker-go-v2.3.8.tar.gz
  source_sha256_build_arg: CHAINMAKER_SOURCE_SHA256
  reuse_policy: source-rebuild
data_driven: true
capabilities:
  - chain-runtime
  - chainmaker-node
  - contract-dev
runtime:
  eco: chainmaker
  adapter_level: 2
  default_tool_codes:
    - code-server
ports:
  - name: rpc
    container_port: 12301
    protocol: TCP
    expose: proxy
    purpose: ChainMaker RPC
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_CHAINMAKER_RPC_PORT
      default: 112301
      container_port: 12301
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
  shell: none
  allowed_mounts: []
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 3Gi
  ephemeral_storage_limit: 4Gi
build:
  context: ../../..
  dockerfile: images/runtime/chainmaker/Dockerfile
selftest:
  commands:
    - name: chainmaker-version
      command:
        - sh
        - -lc
        - "CHAIMIR_SELFTEST=1 /usr/local/bin/chaimir-chainmaker-entrypoint"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

