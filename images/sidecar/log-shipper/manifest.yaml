# 本文件声明 sidecar/log-shipper 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: sidecar
name: log-shipper
image: sidecar/log-shipper
labels:
  app.kubernetes.io/name: log-shipper
  app.kubernetes.io/component: sidecar
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: sidecar
  chaimir.io/image: sidecar/log-shipper
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: control-sidecar
  chaimir.io/scope: sandbox
  chaimir.io/source: platform-built
description: 沙箱日志采集 sidecar 镜像。
source:
  type: platform-built
upstream:
  image: python:3.13-alpine
  digest: sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
  reuse_policy: self-developed-sidecar
env_keys:
  config:
    - CHAIMIR_LOG_PATH
  secret: []
data_driven: false
capabilities:
  - sidecar
  - log-shipping
sidecar:
  purpose: sandbox-log-shipping
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 256Mi
build:
  context: images/sidecar/log-shipper
  dockerfile: Dockerfile
selftest:
  commands:
    - name: syntax
      command:
        - python
        - -m
        - py_compile
        - /app/log_shipper.py
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
