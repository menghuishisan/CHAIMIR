# 本文件声明 middleware/clamav 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: clamav
image: middleware/clamav
labels:
  app.kubernetes.io/name: clamav
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/clamav
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: upload-security-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: upstream-pinned
description: ClamAV clamd 病毒扫描上游固定镜像,供上传链路执行强制病毒校验。
source:
  type: upstream-pinned
upstream:
  registry: docker.io
  image: clamav/clamav
  version: "1.4.4-debian"
  digest: sha256:b9dfea01892e051a8662755bf44fe9f8522653dc30681d061ff74dfa19416794
  digest_required: true
  license: GPL-2.0-only
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - upload-virus-scan
  - clamd-instream
env_keys:
  config:
    - UPLOAD_VIRUS_SCAN_REQUIRED
    - UPLOAD_VIRUS_SCAN_NETWORK
    - UPLOAD_VIRUS_SCAN_ADDRESS
    - UPLOAD_VIRUS_SCAN_TIMEOUT_SECONDS
    - UPLOAD_VIRUS_SCAN_MAX_BYTES
  secret: []
ports:
  - name: clamd
    container_port: 3310
    protocol: TCP
    expose: internal
    purpose: ClamAV clamd TCP protocol
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: 官方 clamd 需要写入病毒库、运行时 socket 和临时扫描文件;只允许写入声明的数据卷与 emptyDir。
    writable_mounts:
      - virus-database
      - runtime
      - tmp
student_access:
  enabled: false
data_volumes:
  - name: database
    mount_path: /var/lib/clamav
    backup_required: false
backup:
  required: false
  mode: upstream-database-refresh
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 1Gi
  memory_limit: 2Gi
  ephemeral_storage_limit: 1Gi
selftest:
  upstream_healthcheck:
    type: tcp
    port: 3310
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
