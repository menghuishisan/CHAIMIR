# 本文件声明 middleware/harbor 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: harbor
image: middleware/harbor
labels:
  app.kubernetes.io/name: harbor
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/harbor
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: stateful-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: upstream-pinned
description: Harbor 私有镜像仓库组件集上游固定入口。
source:
  type: upstream-pinned
upstream:
  registry: docker.io
  image: harbor-component-bundle
  version: "v2.12.0"
  digest_required: true
  component_bundle: true
  components:
    - image: goharbor/nginx-photon
      version: v2.12.0
    - image: goharbor/harbor-core
      version: v2.12.0
    - image: goharbor/harbor-jobservice
      version: v2.12.0
    - image: goharbor/harbor-portal
      version: v2.12.0
    - image: goharbor/harbor-registryctl
      version: v2.12.0
    - image: goharbor/registry-photon
      version: v2.12.0
    - image: goharbor/harbor-db
      version: v2.12.0
    - image: goharbor/redis-photon
      version: v2.12.0
    - image: goharbor/trivy-adapter-photon
      version: v2.12.0
  license: Apache-2.0
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - private-registry
  - image-scanning
  - image-signature-policy
env_keys:
  config:
    - IMAGE_REGISTRY
  secret: []
secrets_required: []
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: gateway
    purpose: Harbor portal/API behind operator ingress
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Harbor 组件集需要写 registry、database、jobservice 和扫描状态卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: registry
    mount_path: /var/lib/registry
    backup_required: true
backup:
  required: true
  mode: registry-replication-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 4Gi
  ephemeral_storage_limit: 4Gi
selftest:
  upstream_healthcheck:
    type: http
    path: /api/v2.0/health
    port: 8080
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
