# 本文件声明 middleware/harbor 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: harbor
image: middleware/harbor
labels:
  app.kubernetes.io/name: harbor
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/harbor
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: stateful-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: upstream-pinned
description: Harbor 私有镜像仓库组件集上游固定入口。
source:
  type: upstream-pinned
upstream:
  registry: docker.io
  image: harbor-component-bundle
  version: "v2.15.1"
  digest_required: true
  component_bundle: true
  components:
    - image: goharbor/nginx-photon
      version: v2.15.1
      digest: sha256:1f9d06d040f2478f6cf7f6da0091877bf987a641810f4bfaadb2a87d73dbf4fb
    - image: goharbor/harbor-core
      version: v2.15.1
      digest: sha256:887a85b8ea98b76bfc9f715f1a0785bb99f9a1034241513902dd6e95be922a83
    - image: goharbor/harbor-jobservice
      version: v2.15.1
      digest: sha256:0de4fd2ce3a02d3e6591b439e4674ea085885ddf43652b44004cc67eb19dba12
    - image: goharbor/harbor-portal
      version: v2.15.1
      digest: sha256:ac55161c57a8351807adf8f8def264bdd52667c371d0436beefebdac4341c9e2
    - image: goharbor/harbor-registryctl
      version: v2.15.1
      digest: sha256:554147a956989175f63f8d41573d716c6ddf6052acd1749c88c0f99ce6ee2bff
    - image: goharbor/registry-photon
      version: v2.15.1
      digest: sha256:ebf0325c2661729dbb317cbf839608eb8b15cfa158911a94976f2c21563c466e
    - image: goharbor/harbor-db
      version: v2.15.1
      digest: sha256:7944d8594a48a8d014e1fa440bc788348f2a779fa2c612ed6b79390cd767e6db
    - image: goharbor/redis-photon
      version: v2.15.1
      digest: sha256:5669d4828805d9ed0bbfc18c101c6ec82d26a13cb9242b48f6348a3e3b2e4cca
    - image: goharbor/trivy-adapter-photon
      version: v2.15.1
      digest: sha256:f0c52bed36c083ec4fded26cefab01e4cd58c9354c261cb3156c69f57bb50131
  license: Apache-2.0
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - private-registry
  - image-scanning
  - image-signature-policy
env_keys:
  config:
    - IMAGE_REGISTRY
  secret: []
secrets_required: []
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: gateway
    purpose: Harbor portal/API behind operator ingress
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Harbor 组件集需要写 registry、database、jobservice 和扫描状态卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: registry
    mount_path: /var/lib/registry
    backup_required: true
backup:
  required: true
  mode: registry-replication-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 4Gi
  ephemeral_storage_limit: 4Gi
selftest:
  upstream_healthcheck:
    type: http
    path: /api/v2.0/health
    port: 8080
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
  deployable: false
  block_reason: "2026-06-22 使用 Trivy 0.71.2 扫描 Harbor v2.15.1 官方组件集仍存在 56 个 CRITICAL 与 389 个 HIGH,其中 436 个带 fixed version;在官方干净版本、源码重建或替代仓库方案通过门禁前不得部署。"
