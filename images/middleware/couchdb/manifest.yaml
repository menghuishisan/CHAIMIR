# 本文件声明 middleware/couchdb 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: couchdb
image: middleware/couchdb
labels:
  app.kubernetes.io/name: couchdb
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/couchdb
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: stateful-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: thin-wrapper
description: Fabric 富查询状态库 CouchDB 安全薄封装镜像。
source:
  type: thin-wrapper
upstream:
  registry: cgr.dev
  image: chainguard/wolfi-base
  version: "latest"
  packages:
    - couchdb-3.3=3.3.3
  reuse_policy: wolfi-package-build
  license: Apache-2.0
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - fabric-state-database
  - rich-query
env_keys:
  config: []
  secret: []
secrets_required: []
ports:
  - name: http
    container_port: 5984
    protocol: TCP
    expose: internal
    purpose: CouchDB HTTP API for Fabric peers
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: CouchDB 需要写状态库文件和运行时索引。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: data
    mount_path: /opt/couchdb/data
    backup_required: true
backup:
  required: true
  mode: fabric-state-snapshot-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 512Mi
selftest:
  upstream_healthcheck:
    type: http
    path: /_up
    port: 5984
build:
  context: images/middleware/couchdb
  dockerfile: Dockerfile
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
