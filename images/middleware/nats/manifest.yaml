# 本文件声明 middleware/nats 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: nats
image: middleware/nats
labels:
  app.kubernetes.io/name: nats
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/nats
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: stateful-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: upstream-pinned
description: NATS 事件总线上游固定镜像。
source:
  type: upstream-pinned
upstream:
  registry: docker.io
  image: nats
  version: "2.11-alpine"
  digest_required: true
  digest_lock_ref: images/locks/middleware/nats.lock.yaml
  license: Apache-2.0
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - event-bus
  - jetstream
env_keys:
  config:
    - NATS_URL
    - NATS_RECONNECT_WAIT_SECONDS
  secret:
    - NATS_TOKEN
secrets_required:
  - env: NATS_TOKEN
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
ports:
  - name: client
    container_port: 4222
    protocol: TCP
    expose: internal
    purpose: NATS client protocol
  - name: monitor
    container_port: 8222
    protocol: TCP
    expose: internal
    purpose: NATS monitoring, operator only
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: JetStream 需要写事件持久化数据。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: data
    mount_path: /data
    backup_required: true
backup:
  required: true
  mode: jetstream-snapshot-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 512Mi
selftest:
  upstream_healthcheck:
    type: http
    path: /healthz
    port: 8222
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
