# 本文件声明 middleware/postgres 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: postgres
image: middleware/postgres
labels:
  app.kubernetes.io/name: postgres
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/postgres
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: stateful-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: thin-wrapper
description: PostgreSQL 主数据库官方薄封装镜像。
source:
  type: thin-wrapper
upstream:
  registry: docker.io
  image: library/postgres
  version: "18-alpine"
  digest: sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
  reuse_policy: security-thin-wrapper
  license: PostgreSQL
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - relational-database
  - rls-tenant-store
env_keys:
  config:
    - PG_DATABASE
    - PG_PORT
  secret:
    - PG_PRIV_USER
    - PG_PRIV_PASSWORD
secrets_required:
  - env: PG_PRIV_USER
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
  - env: PG_PRIV_PASSWORD
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
ports:
  - name: postgres
    container_port: 5432
    protocol: TCP
    expose: internal
    purpose: PostgreSQL wire protocol
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: PostgreSQL 官方镜像需要写数据库文件和运行时 socket;只允许写入声明的数据卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: data
    mount_path: /var/lib/postgresql/data
    backup_required: true
backup:
  required: true
  mode: logical-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 1Gi
selftest:
  upstream_healthcheck:
    type: exec
    command:
      - pg_isready
build:
  context: images/middleware/postgres
  dockerfile: Dockerfile
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
