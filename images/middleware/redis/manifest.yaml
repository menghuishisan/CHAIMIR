# 本文件声明 middleware/redis 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: middleware
name: redis
image: middleware/redis
labels:
  app.kubernetes.io/name: redis
  app.kubernetes.io/component: middleware
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: middleware
  chaimir.io/image: middleware/redis
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: stateful-middleware
  chaimir.io/scope: middleware
  chaimir.io/source: thin-wrapper
description: Redis 缓存、会话和轻量队列官方薄封装镜像。
source:
  type: thin-wrapper
upstream:
  registry: docker.io
  image: library/redis
  version: "8-alpine"
  digest: sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
  reuse_policy: security-thin-wrapper
  license: BSD-3-Clause
private_delivery:
  offline_bundle: true
  import_project: middleware
data_driven: false
capabilities:
  - cache
  - session-store
  - rate-limit-store
env_keys:
  config:
    - REDIS_PORT
    - REDIS_DB
  secret:
    - REDIS_PASSWORD
secrets_required:
  - env: REDIS_PASSWORD
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
ports:
  - name: redis
    container_port: 6379
    protocol: TCP
    expose: internal
    purpose: Redis RESP protocol
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Redis AOF 与运行状态需要写入数据卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: data
    mount_path: /data
    backup_required: true
backup:
  required: true
  mode: aof-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 512Mi
selftest:
  upstream_healthcheck:
    type: exec
    command:
      - redis-cli
      - ping
build:
  context: images/middleware/redis
  dockerfile: Dockerfile
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
