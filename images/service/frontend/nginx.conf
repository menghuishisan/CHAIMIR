# 本文件配置四端前端静态资源路由和 SPA fallback,运行在非 root Nginx 8080 端口。
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;

    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /teacher {
            return 308 /teacher/;
        }

        location /teacher/ {
            try_files $uri $uri/ /teacher/index.html;
        }

        location = /school-admin {
            return 308 /school-admin/;
        }

        location /school-admin/ {
            try_files $uri $uri/ /school-admin/index.html;
        }

        location = /platform-admin {
            return 308 /platform-admin/;
        }

        location /platform-admin/ {
            try_files $uri $uri/ /platform-admin/index.html;
        }

        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
