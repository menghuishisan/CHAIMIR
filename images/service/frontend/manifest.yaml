# 本文件声明 service/frontend 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: service
name: frontend
image: service/frontend
labels:
  app.kubernetes.io/name: frontend
  app.kubernetes.io/component: service
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: service
  chaimir.io/image: service/frontend
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: control-plane
  chaimir.io/scope: platform
  chaimir.io/source: thin-wrapper
description: 前端静态资源服务镜像。
source:
  type: thin-wrapper
upstream:
  image: nginx:1.27-alpine
  reuse_policy: thin-wrapper
data_driven: false
capabilities:
  - platform-service
  - static-frontend
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: gateway
    purpose: 前端 HTTP
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_FRONTEND_PORT
      default: 18081
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 100m
  cpu_limit: "1"
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 512Mi
build:
  context: ../../..
  dockerfile: images/service/frontend/Dockerfile
selftest:
  commands:
    - name: nginx-version
      command:
        - nginx
        - -v
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


