# 本文件声明 service/backend 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: service
name: backend
image: service/backend
labels:
  app.kubernetes.io/name: backend
  app.kubernetes.io/component: service
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: service
  chaimir.io/image: service/backend
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: control-plane
  chaimir.io/scope: platform
  chaimir.io/source: platform-built
description: 后端模块化单体 API 与控制面服务镜像。
source:
  type: platform-built
upstream:
  builder: base/go-builder
  builder_version: go1.26.5
  runtime: base/runtime-min
  reuse_policy: multi-stage-build
data_driven: false
capabilities:
  - platform-service
  - control-plane
  - api-worker
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: gateway
    purpose: 后端 HTTP API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_BACKEND_PORT
      default: 18080
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 250m
  cpu_limit: "2"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 1Gi
build:
  context: ../../..
  dockerfile: images/service/backend/Dockerfile
selftest:
  commands:
    - name: binary-help
      command:
        - /app/server
        - --help
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

