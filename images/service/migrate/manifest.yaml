# 本文件声明 service/migrate 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: service
name: migrate
image: service/migrate
labels:
  app.kubernetes.io/name: migrate
  app.kubernetes.io/component: service
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: service
  chaimir.io/image: service/migrate
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: control-plane
  chaimir.io/scope: platform
  chaimir.io/source: platform-built
description: 数据库迁移、RLS 初始化和 seed 命令镜像。
source:
  type: platform-built
upstream:
  builder: golang:1.25-bookworm
  runtime: gcr.io/distroless/static-debian12:nonroot
  reuse_policy: multi-stage-build
data_driven: false
capabilities:
  - platform-service
  - database-migration
  - seed-runner
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 100m
  cpu_limit: "1"
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 1Gi
build:
  context: ../../..
  dockerfile: images/service/migrate/Dockerfile
selftest:
  commands:
    - name: binary-help
      command:
        - /app/migrate
        - --help
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


