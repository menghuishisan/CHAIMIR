# 本文件声明 infra/wallet-backend 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: wallet-backend
image: infra/wallet-backend
labels:
  app.kubernetes.io/name: wallet-backend
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/wallet-backend
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: DApp 登录和签名教学钱包后端镜像。
source:
  type: thin-wrapper
upstream:
  image: node:20-bookworm-slim
  reuse_policy: service-wrapper
env_keys:
  config:
    - CHAIMIR_IMAGE_PORT
    - CHAIMIR_MAX_BODY_BYTES
    - CHAIMIR_IMAGE_SERVICE_AUTH_MAX_SKEW_SECONDS
    - CHAIMIR_WALLET_ALLOWED_DOMAINS
  secret:
    - CHAIMIR_WALLET_SIGNER_PRIVATE_KEY
    - CHAIMIR_WALLET_SESSION_SECRET
secrets_required:
  - env: CHAIMIR_WALLET_SIGNER_PRIVATE_KEY
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
  - env: CHAIMIR_WALLET_SESSION_SECRET
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
data_driven: true
capabilities:
  - wallet-backend
infra:
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
  roles:
    - wallet
    - signing-demo
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: internal
    purpose: Wallet backend API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_WALLET_BACKEND_PORT
      default: 18091
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/wallet-backend
  dockerfile: Dockerfile
selftest:
  commands:
    - name: node-syntax
      command:
        - node
        - --check
        - /app/wallet-backend.mjs
    - name: auth-required
      command:
        - node
        - -e
        - "const fs=require('fs'); const src=fs.readFileSync('/app/wallet-backend.mjs','utf8'); if(!src.includes('verifyServiceSignature') || !src.includes('CHAIMIR_WALLET_ALLOWED_DOMAINS')) process.exit(1)"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

