# 本文件声明 infra/chainlink-node 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: chainlink-node
image: infra/chainlink-node
labels:
  app.kubernetes.io/name: chainlink-node
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/chainlink-node
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Chainlink 预言机节点镜像。
source:
  type: thin-wrapper
upstream:
  image: smartcontract/chainlink:2.54.0
  digest: sha256:77a78d4e427c39b3810bf740ba7582240c4c6538d31d0e1069ba0852acb58bc5
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - oracle-service
  - chainlink-node
infra:
  eco_tags:
    - evm
  roles:
    - oracle
    - vrf
    - automation
ports:
  - name: http
    container_port: 6688
    protocol: TCP
    expose: internal
    purpose: Chainlink node API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_CHAINLINK_PORT
      default: 16688
      container_port: 6688
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Chainlink 节点需要写运行状态、密钥库引用和日志缓存;只允许写入 runtime-state 和受控 Secret 挂载。
    writable_mounts:
      - runtime-state
      - secret
student_access:
  enabled: false
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 3Gi
  ephemeral_storage_limit: 4Gi
build:
  context: images/infra/chainlink-node
  dockerfile: Dockerfile
selftest:
  commands:
    - name: chainlink-version
      command:
        - chainlink
        - --version
supply_chain:
  deployable: false
  block_reason: 2026-07-12 官方最新 smartcontract/chainlink:2.54.0 的 Linux/amd64 产物仍由 Go 1.26.4 构建,Trivy 0.71.2 检出 CVE-2026-39822 HIGH,修复版本为 Go 1.26.5;在官方发布使用修复工具链的稳定镜像前不得部署。
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
