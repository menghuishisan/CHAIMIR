# 本文件声明 infra/thegraph-node 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: thegraph-node
image: infra/thegraph-node
labels:
  app.kubernetes.io/name: thegraph-node
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/thegraph-node
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: The Graph subgraph 索引节点镜像。
source:
  type: thin-wrapper
upstream:
  image: graphprotocol/graph-node:0.44.0
  version: "0.44.0"
  digest: sha256:c14c6d8e2b2b1ed89f6a89babf48d807b18a43e372fda7fb495d3a9050b65b8b
  runtime: cgr.dev/chainguard/wolfi-base
  runtime_digest: sha256:02dab76bd852a70556b5b2002195c8a5fdab77d323c433bf6642aab080489795
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - chain-indexer
  - subgraph-runner
infra:
  eco_tags:
    - evm
  roles:
    - indexer
    - subgraph
ports:
  - name: graphql
    container_port: 8000
    protocol: TCP
    expose: proxy
    purpose: GraphQL query API
  - name: admin
    container_port: 8020
    protocol: TCP
    expose: internal
    purpose: Subgraph deploy API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_THEGRAPH_QUERY_PORT
      default: 18000
      container_port: 8000
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: graph-node 上游服务需要写运行缓存;索引数据必须写入 postgres-graph 或受控数据库。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 4Gi
  ephemeral_storage_limit: 8Gi
build:
  context: images/infra/thegraph-node
  dockerfile: Dockerfile
selftest:
  commands:
    - name: graph-node-version
      command:
        - graph-node
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
