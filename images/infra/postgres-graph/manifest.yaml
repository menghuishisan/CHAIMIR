# 本文件声明 infra/postgres-graph 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: postgres-graph
image: infra/postgres-graph
labels:
  app.kubernetes.io/name: postgres-graph
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/postgres-graph
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: The Graph 索引用 PostgreSQL 配套镜像。
source:
  type: thin-wrapper
upstream:
  image: postgres:16-alpine
  digest: sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - graph-datastore
  - postgres-compatible
infra:
  eco_tags:
    - evm
  roles:
    - datastore
    - indexer-dependency
ports:
  - name: postgres
    container_port: 5432
    protocol: TCP
    expose: internal
    purpose: Graph indexing database
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_GRAPH_POSTGRES_PORT
      default: 15433
      container_port: 5432
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: PostgreSQL 数据库必须写数据目录;仅允许写入 runtime-state 持久卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 8Gi
build:
  context: images/infra/postgres-graph
  dockerfile: Dockerfile
selftest:
  commands:
    - name: postgres-version
      command:
        - postgres
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
