# 本文件声明 infra/event-listener 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: event-listener
image: infra/event-listener
labels:
  app.kubernetes.io/name: event-listener
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/event-listener
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: 链上事件监听教学服务镜像。
source:
  type: thin-wrapper
upstream:
  image: node:20-bookworm-slim
  reuse_policy: service-wrapper
data_driven: true
capabilities:
  - event-listener
infra:
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  roles:
    - event-listener
    - backend-integration
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: internal
    purpose: Event listener API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_EVENT_LISTENER_PORT
      default: 18093
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/event-listener
  dockerfile: Dockerfile
selftest:
  commands:
    - name: node-syntax
      command:
        - node
        - --check
        - /app/event-listener.mjs
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

