# 本文件声明 infra/paymaster 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: paymaster
image: infra/paymaster
labels:
  app.kubernetes.io/name: paymaster
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/paymaster
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: 账户抽象代付 gas 教学服务镜像。
source:
  type: thin-wrapper
upstream:
  image: node:20-bookworm-slim
  reuse_policy: service-wrapper
env_keys:
  config:
    - CHAIMIR_IMAGE_PORT
    - CHAIMIR_MAX_BODY_BYTES
    - CHAIMIR_IMAGE_SERVICE_AUTH_MAX_SKEW_SECONDS
    - CHAIMIR_EVM_RPC_URL
    - CHAIMIR_ENTRYPOINT_ADDRESS
  secret:
    - CHAIMIR_PAYMASTER_PRIVATE_KEY
    - CHAIMIR_PAYMASTER_SERVICE_AUTH_SECRET
secrets_required:
  - env: CHAIMIR_PAYMASTER_PRIVATE_KEY
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
  - env: CHAIMIR_PAYMASTER_SERVICE_AUTH_SECRET
    source: deploy/config/chaimir.env
    runtime_value: secret-or-kms
data_driven: true
capabilities:
  - erc4337-paymaster
infra:
  eco_tags:
    - evm
  roles:
    - account-abstraction
    - gas-sponsor
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: internal
    purpose: Paymaster service API
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_PAYMASTER_PORT
      default: 18090
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/paymaster
  dockerfile: Dockerfile
selftest:
  commands:
    - name: node-syntax
      command:
        - node
        - --check
        - /app/paymaster-service.mjs
    - name: auth-required
      command:
        - node
        - -e
        - "const fs=require('fs'); const src=fs.readFileSync('/app/paymaster-service.mjs','utf8'); if(!src.includes('verifyServiceSignature') || !src.includes('validateUserOperation')) process.exit(1)"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

