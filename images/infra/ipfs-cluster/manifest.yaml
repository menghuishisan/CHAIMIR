# 本文件声明 infra/ipfs-cluster 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: ipfs-cluster
image: infra/ipfs-cluster
labels:
  app.kubernetes.io/name: ipfs-cluster
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/ipfs-cluster
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: IPFS Cluster 多节点存储协调镜像。
source:
  type: thin-wrapper
upstream:
  source_repo: https://github.com/ipfs-cluster/ipfs-cluster
  source_ref: v1.1.6
  version: v1.1.6
  runtime_image: gcr.io/distroless/base-debian12:nonroot
  runtime_digest: sha256:4b5196599229a5cf312a676cfe1ee8587ecf2371dcc22620f8c7a66d77d125c8
  reuse_policy: rebuild-official-release-source
data_driven: true
capabilities:
  - decentralized-storage
  - ipfs-cluster
infra:
  eco_tags:
    - evm
    - fabric
    - fisco
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  roles:
    - storage
    - cluster
ports:
  - name: api
    container_port: 9094
    protocol: TCP
    expose: internal
    purpose: IPFS Cluster API
  - name: proxy
    container_port: 9096
    protocol: TCP
    expose: internal
    purpose: IPFS Cluster proxy
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_IPFS_CLUSTER_API_PORT
      default: 19094
      container_port: 9094
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: IPFS Cluster 需要写 peer 状态和 pinset;只允许写入 runtime-state 和受控 Secret 挂载。
    writable_mounts:
      - runtime-state
      - secret
student_access:
  enabled: false
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 8Gi
build:
  context: images/infra/ipfs-cluster
  dockerfile: Dockerfile
selftest:
  commands:
    - name: cluster-version
      command:
        - ipfs-cluster-service
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
