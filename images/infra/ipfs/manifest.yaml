# 本文件声明 infra/ipfs 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: ipfs
image: infra/ipfs
labels:
  app.kubernetes.io/name: ipfs
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/ipfs
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: IPFS/Kubo 内容寻址存储节点镜像。
source:
  type: thin-wrapper
upstream:
  image: ipfs/kubo:v0.34.1
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - decentralized-storage
  - ipfs-node
infra:
  eco_tags:
    - evm
    - fabric
    - fisco
    - chainmaker
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  roles:
    - storage
    - content-addressing
ports:
  - name: api
    container_port: 5001
    protocol: TCP
    expose: internal
    purpose: IPFS API
  - name: gateway
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: IPFS gateway
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_IPFS_API_PORT
      default: 15001
      container_port: 5001
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: IPFS 节点需要写 repo、blockstore 和 pin 状态;只允许写入 runtime-state。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 8Gi
build:
  context: images/infra/ipfs
  dockerfile: Dockerfile
selftest:
  commands:
    - name: ipfs-version
      command:
        - ipfs
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

