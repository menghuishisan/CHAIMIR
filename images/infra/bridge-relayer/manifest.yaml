# 本文件声明 infra/bridge-relayer 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: bridge-relayer
image: infra/bridge-relayer
labels:
  app.kubernetes.io/name: bridge-relayer
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/bridge-relayer
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: 基于 Hyperlane 官方 agent 的跨链桥中继教学服务镜像。
source:
  type: thin-wrapper
upstream:
  image: ghcr.io/hyperlane-xyz/hyperlane-agent
  version: 2.2.0
  commit: 4da9c4419ad89783fd005e0b776f1fdcd7b59c12
  digest: sha256:ed2a0dcc7ebe7accd2bec88f82ce196bb455f4cf9a4d84d7a9192052b1911551
  reuse_policy: official-thin-wrapper
data_driven: true
capabilities:
  - cross-chain-relayer
infra:
  eco_tags:
    - evm
  roles:
    - relayer
    - cross-chain
env_keys:
  config:
    - HYP_BASE_CONFIG
    - HYP_DB
    - HYP_RELAYCHAINS
  secret:
    - HYP_CHAINS
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/infra/bridge-relayer
  dockerfile: Dockerfile
selftest:
  commands:
    - name: hyperlane-relayer-binary
      command:
        - test
        - -x
        - /app/relayer
    - name: entrypoint-syntax
      command:
        - sh
        - -n
        - /usr/local/bin/chaimir-bridge-relayer-entrypoint
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
