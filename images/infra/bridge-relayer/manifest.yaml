# 本文件声明 infra/bridge-relayer 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: bridge-relayer
image: infra/bridge-relayer
labels:
  app.kubernetes.io/name: bridge-relayer
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/bridge-relayer
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: 跨链桥中继教学服务镜像。
source:
  type: thin-wrapper
upstream:
  image: node:20-bookworm-slim
  reuse_policy: toolchain-wrapper
data_driven: true
capabilities:
  - cross-chain-relayer
infra:
  eco_tags:
    - evm
    - cosmos
    - substrate
  roles:
    - relayer
    - cross-chain
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/bridge-relayer
  dockerfile: Dockerfile
selftest:
  commands:
    - name: wormhole-sdk
      command:
        - node
        - -e
        - import('@certusone/wormhole-sdk').then(() => console.log('ready'))
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

