# 本文件声明 infra/rpc-gateway 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: rpc-gateway
image: infra/rpc-gateway
labels:
  app.kubernetes.io/name: rpc-gateway
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/rpc-gateway
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: DApp 多节点 RPC 网关教学镜像。
source:
  type: thin-wrapper
upstream:
  image: envoyproxy/envoy:v1.32.3
  reuse_policy: thin-wrapper
data_driven: true
capabilities:
  - rpc-gateway
infra:
  eco_tags:
    - evm
    - fabric
    - fisco
    - solana
    - aptos
    - sui
    - cosmos
    - substrate
    - near
    - bitcoin
    - edu
  roles:
    - rpc-proxy
    - load-balancer
ports:
  - name: http
    container_port: 8080
    protocol: TCP
    expose: proxy
    purpose: RPC gateway proxy
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_RPC_GATEWAY_PORT
      default: 18092
      container_port: 8080
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/rpc-gateway
  dockerfile: Dockerfile
selftest:
  commands:
    - name: envoy-version
      command:
        - envoy
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
