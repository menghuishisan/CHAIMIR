# 本文件声明 infra/zk-prover 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: zk-prover
image: infra/zk-prover
labels:
  app.kubernetes.io/name: zk-prover
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/zk-prover
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: ZK rollup 证明器教学镜像。
source:
  type: thin-wrapper
upstream:
  image: node:22-bookworm-slim
  reuse_policy: toolchain-wrapper
data_driven: true
capabilities:
  - zk-prover
  - proof-generation
infra:
  eco_tags:
    - evm
  roles:
    - zk
    - prover
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/zk-prover
  dockerfile: Dockerfile
selftest:
  commands:
    - name: snarkjs-powersoftau
      command:
        - sh
        - -lc
        - tmp=$(mktemp -d); cd "$tmp"; snarkjs powersoftau new bn128 2 pot.ptau
    - name: entrypoint-syntax
      command:
        - sh
        - -n
        - /usr/local/bin/chaimir-zk-prover-entrypoint
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

