# 本文件声明 infra/op-stack 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: op-stack
image: infra/op-stack
labels:
  app.kubernetes.io/name: op-stack
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/op-stack
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Optimism 风格 L2 教学编排镜像。
source:
  type: thin-wrapper
upstream:
  image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:v1.10.2
  reuse_policy: thin-wrapper
env_keys:
  config:
    - CHAIMIR_OP_NODE_L1_RPC
    - CHAIMIR_OP_NODE_L2_RPC
    - CHAIMIR_OP_NODE_ROLLUP_CONFIG
    - CHAIMIR_OP_NODE_RPC_PORT
  secret: []
data_driven: true
capabilities:
  - l2-stack
  - rollup-sequencer
infra:
  eco_tags:
    - evm
  roles:
    - l2
    - sequencer
    - rollup
ports:
  - name: http
    container_port: 8545
    protocol: TCP
    expose: internal
    purpose: OP Stack RPC
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_OP_STACK_PORT
      default: 18087
      container_port: 8545
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/op-stack
  dockerfile: Dockerfile
selftest:
  commands:
    - name: entrypoint-syntax
      command:
        - sh
        - -n
        - /usr/local/bin/chaimir-op-stack-entrypoint
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

