# 本文件声明 infra/op-stack 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: infra
name: op-stack
image: infra/op-stack
labels:
  app.kubernetes.io/name: op-stack
  app.kubernetes.io/component: infra
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: infra
  chaimir.io/image: infra/op-stack
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: sandbox-infra
  chaimir.io/scope: sandbox
  chaimir.io/source: thin-wrapper
description: Optimism 风格 L2 教学编排镜像。
source:
  type: thin-wrapper
upstream:
  repository: https://github.com/ethereum-optimism/optimism
  version: v1.19.2
  source_commit: da197e45ed44b9fca258b3b0d0709e8dfca1c7cd
  source_archive: https://github.com/ethereum-optimism/optimism/archive/da197e45ed44b9fca258b3b0d0709e8dfca1c7cd.tar.gz
  source_sha256: 0ff5ab74e76b35f0225c6e417ec9fae1025fff46e104a77341593919ae4d17de
  superchain_registry_commit: d84b53b7ee008f863c1d3bbb49e06f713f713978
  superchain_registry_archive: https://github.com/ethereum-optimism/superchain-registry/archive/d84b53b7ee008f863c1d3bbb49e06f713f713978.tar.gz
  superchain_registry_sha256: 08600ee12e2d8933275813e4ef74e30929f95c249f6bce714c9c337527c20d4c
  rebuild_policy: source-rebuild
  security_overrides:
    github.com/libp2p/go-libp2p: v0.39.1
    github.com/quic-go/quic-go: v0.49.1
    github.com/pion/interceptor: v0.1.39
env_keys:
  config:
    - OP_NODE_L1_ETH_RPC
    - OP_NODE_L2_ENGINE_RPC
    - OP_NODE_ROLLUP_CONFIG
    - OP_NODE_RPC_ADDR
    - OP_NODE_RPC_PORT
  secret: []
data_driven: true
capabilities:
  - l2-stack
  - rollup-sequencer
infra:
  eco_tags:
    - evm
  roles:
    - l2
    - sequencer
    - rollup
ports:
  - name: http
    container_port: 8545
    protocol: TCP
    expose: internal
    purpose: OP Stack RPC
local_dev:
  host_mappings:
    - host: 127.0.0.1
      env: CHAIMIR_DEV_OP_STACK_PORT
      default: 18087
      container_port: 8545
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 250m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 512Mi
build:
  context: images/infra/op-stack
  dockerfile: Dockerfile
selftest:
  commands:
    - name: op-node-version
      command:
        - op-node
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
