# 本文件声明 ingress/ingress-nginx 上游固定镜像的来源、配置、端口和生产门禁。
schema_version: 1
category: ingress
name: ingress-nginx
image: ingress/ingress-nginx
labels:
  app.kubernetes.io/name: ingress-nginx
  app.kubernetes.io/component: ingress
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: ingress
  chaimir.io/image: ingress/ingress-nginx
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: edge-gateway
  chaimir.io/scope: ingress
  chaimir.io/source: upstream-pinned
description: ingress-nginx 控制器上游固定镜像。
source:
  type: upstream-pinned
upstream:
  registry: registry.k8s.io
  image: ingress-nginx/controller
  version: "v1.13.0"
  digest_required: true
  license: Apache-2.0
private_delivery:
  offline_bundle: true
  import_project: ingress
data_driven: false
capabilities:
  - ingress-controller
  - authenticated-routing
env_keys:
  config:
    - WS_ALLOWED_ORIGINS
  secret: []
secrets_required: []
ports:
  - name: http
    container_port: 80
    protocol: TCP
    expose: gateway
    purpose: HTTP ingress
  - name: https
    container_port: 443
    protocol: TCP
    expose: gateway
    purpose: HTTPS ingress
  - name: webhook
    container_port: 8443
    protocol: TCP
    expose: internal
    purpose: Admission webhook
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: ingress-nginx 需要写临时 Nginx 配置、PID 和缓存目录。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: runtime-state
    mount_path: /tmp/nginx
    backup_required: false
backup:
  required: false
  mode: declarative-config-only
network:
  expose: gateway
  default_deny: true
resources:
  cpu_request: 100m
  cpu_limit: "1"
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 512Mi
selftest:
  upstream_healthcheck:
    type: http
    path: /healthz
    port: 10254
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
