# 本文件声明 base/judge-min 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: base
name: judge-min
image: base/judge-min
labels:
  app.kubernetes.io/name: judge-min
  app.kubernetes.io/component: base
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: base
  chaimir.io/image: base/judge-min
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: build-base
  chaimir.io/scope: build
  chaimir.io/source: build-base
description: 判题执行器最小安全基座镜像。
source:
  type: build-base
upstream:
  image: alpine:3.22
  reuse_policy: thin-wrapper
data_driven: false
capabilities:
  - runtime-base
  - minimal-judge-runtime
  - judge-result-normalizer
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 100m
  cpu_limit: "1"
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 1Gi
build:
  context: ../../..
  dockerfile: images/base/judge-min/Dockerfile
selftest:
  commands:
    - name: non-root-user
      command:
        - bash
        - -lc
        - "test $(id -u) -ne 0"
    - name: normalize-result-contract
      command:
        - bash
        - -lc
        - "normalize-result --mode exit-code --exit-code 0 --source selftest | grep '\"passed\":true'"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true


