# 本文件声明 base/runtime-min 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: base
name: runtime-min
image: base/runtime-min
labels:
  app.kubernetes.io/name: runtime-min
  app.kubernetes.io/component: base
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: base
  chaimir.io/image: base/runtime-min
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: build-base
  chaimir.io/scope: build
  chaimir.io/source: build-base
description: 最小非 root 运行时基座镜像。
source:
  type: build-base
upstream:
  image: gcr.io/distroless/static-debian12:nonroot
  digest: sha256:b7bb25d9f7c31d2bdd1982feb4dafcaf137703c7075dbe2febb41c24212b946f
  reuse_policy: direct-base
data_driven: false
capabilities:
  - runtime-base
  - minimal-nonroot-runtime
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 50m
  cpu_limit: 500m
  memory_request: 64Mi
  memory_limit: 256Mi
  ephemeral_storage_limit: 256Mi
build:
  context: ../../..
  dockerfile: images/base/runtime-min/Dockerfile
selftest:
  commands: []
  note: distroless 基座无 shell 和业务二进制,自检由构建、SBOM、漏洞扫描和下游服务镜像启动测试覆盖。
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

