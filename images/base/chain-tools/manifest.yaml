# 本文件声明 base/chain-tools 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: base
name: chain-tools
image: base/chain-tools
labels:
  app.kubernetes.io/name: chain-tools
  app.kubernetes.io/component: base
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: base
  chaimir.io/image: base/chain-tools
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: build-base
  chaimir.io/scope: build
  chaimir.io/source: build-base
description: 链工具公共基座镜像。
source:
  type: build-base
upstream:
  image: alpine:3.23
  digest: sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
  reuse_policy: thin-wrapper
data_driven: false
capabilities:
  - toolchain-base
  - blockchain-cli-tooling
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 100m
  cpu_limit: "1"
  memory_request: 128Mi
  memory_limit: 512Mi
  ephemeral_storage_limit: 2Gi
build:
  context: ../../..
  dockerfile: images/base/chain-tools/Dockerfile
selftest:
  commands:
    - name: common-tools
      command:
        - bash
        - -lc
        - "curl --version >/dev/null && jq --version >/dev/null"
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

