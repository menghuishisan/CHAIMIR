# 本文件声明 base/go-builder 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: base
name: go-builder
image: base/go-builder
labels:
  app.kubernetes.io/name: go-builder
  app.kubernetes.io/component: base
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: base
  chaimir.io/image: base/go-builder
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: build-base
  chaimir.io/scope: build
  chaimir.io/source: build-base
description: Go 多阶段构建基座镜像。
source:
  type: build-base
upstream:
  components:
    - image: library/alpine
      registry: docker.io
      version: "3.23"
      digest: sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
    - image: go
      registry: https://go.dev/dl
      version: go1.26.5
      digest: sha256:5c2c3b16caefa1d968a94c1daca04a7ca301a496d9b086e17ad77bb81393f053
  release_url: https://go.dev/dl/go1.26.5.linux-amd64.tar.gz
  sha256: 5c2c3b16caefa1d968a94c1daca04a7ca301a496d9b086e17ad77bb81393f053
  version: go1.26.5
  reuse_policy: official-release-toolchain
data_driven: false
capabilities:
  - build-base
  - go-build-toolchain
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 250m
  cpu_limit: "2"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 8Gi
build:
  context: ../../..
  dockerfile: images/base/go-builder/Dockerfile
selftest:
  commands:
    - name: go-version
      command:
        - go
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true

