# 本文件声明 base/fabric-tools 的职责、来源、构建和供应链约束。
schema_version: 1
category: base
name: fabric-tools
image: base/fabric-tools
labels:
  app.kubernetes.io/name: fabric-tools
  app.kubernetes.io/component: base
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: base
  chaimir.io/image: base/fabric-tools
  chaimir.io/source: build-base
description: 从 Hyperledger Fabric v2.5.16 官方源码重建的共享工具基座。
source:
  type: build-base
upstream:
  repository: https://github.com/hyperledger/fabric
  version: v2.5.16
  commit: f871cf92a026aba7b12e6f06d71ded3e6e659d71
  source_archive: https://github.com/hyperledger/fabric/archive/f871cf92a026aba7b12e6f06d71ded3e6e659d71.tar.gz
  source_sha256: dbcd31de33eeff358fe923d5cbb669b33cb653ef10ae2e6505555e372ae26d82
  builder: base/go-builder
  reuse_policy: official-source-rebuild
capabilities:
  - fabric-tools
  - peer
  - channel-config
ports: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 100m
  cpu_limit: "1"
  memory_request: 128Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 2Gi
build:
  context: images/base/fabric-tools
  dockerfile: Dockerfile
selftest:
  commands:
    - name: peer-version
      command:
        - /usr/local/bin/peer
        - version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
