# 本文件声明 observability/grafana 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: observability
name: grafana
image: observability/grafana
labels:
  app.kubernetes.io/name: grafana
  app.kubernetes.io/component: observability
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: observability
  chaimir.io/image: observability/grafana
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: observability
  chaimir.io/scope: observability
  chaimir.io/source: thin-wrapper
description: Grafana 监控看板安全薄封装镜像。
source:
  type: thin-wrapper
upstream:
  registry: cgr.dev
  image: chainguard/wolfi-base
  version: "2026-07-07"
  digest: sha256:02dab76bd852a70556b5b2002195c8a5fdab77d323c433bf6642aab080489795
  packages:
    - grafana-13.0=13.0.2-r1
    - grafana-13.0-oci-entrypoint-compat=13.0.2-r1
  reuse_policy: wolfi-package-build
  license: AGPL-3.0
private_delivery:
  offline_bundle: true
  import_project: observability
data_driven: false
capabilities:
  - dashboards
  - monitoring-embed
env_keys:
  config:
    - MONITORING_PANELS_JSON
  secret: []
secrets_required: []
ports:
  - name: http
    container_port: 3000
    protocol: TCP
    expose: gateway
    purpose: Grafana UI through authenticated ingress
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Grafana 需要写插件、会话和 SQLite/缓存数据卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: data
    mount_path: /var/lib/grafana
    backup_required: true
backup:
  required: true
  mode: dashboard-export-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 100m
  cpu_limit: 500m
  memory_request: 256Mi
  memory_limit: 1Gi
  ephemeral_storage_limit: 1Gi
selftest:
  upstream_healthcheck:
    type: http
    path: /api/health
    port: 3000
build:
  context: images/observability/grafana
  dockerfile: Dockerfile
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
