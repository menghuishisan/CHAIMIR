# 本文件声明 observability/prometheus 上游固定镜像的来源、配置、端口、数据卷和生产门禁。
schema_version: 1
category: observability
name: prometheus
image: observability/prometheus
labels:
  app.kubernetes.io/name: prometheus
  app.kubernetes.io/component: observability
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: observability
  chaimir.io/image: observability/prometheus
  chaimir.io/data-driven: "false"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: observability
  chaimir.io/scope: observability
  chaimir.io/source: platform-built
description: Prometheus 指标采集平台官方源码安全重建镜像。
source:
  type: platform-built
upstream:
  source_repository: https://github.com/prometheus/prometheus
  version: v3.12.0
  source_commit: 9f27dffc1f93ca23287972f632025879f2d1c658
  source_archive: https://github.com/prometheus/prometheus/archive/refs/tags/v3.12.0.tar.gz
  source_sha256: ca7a8dd2c57048bb952a493a2957811c6f380089c2b158c2def484b874c3b6d7
  builder_arg: GO_BUILDER_IMAGE
  assets_builder_arg: NODE_BUILDER_IMAGE
  runtime_image: cgr.dev/chainguard/wolfi-base
  runtime_version: "2026-07-07"
  runtime_digest: sha256:02dab76bd852a70556b5b2002195c8a5fdab77d323c433bf6642aab080489795
  runtime_packages:
    - ca-certificates=20260413-r0
    - tzdata=2026c-r0
  security_overrides:
    golang.org/x/crypto: v0.52.0
  reuse_policy: rebuild-official-release-source
  license: Apache-2.0
private_delivery:
  offline_bundle: true
  import_project: observability
data_driven: false
capabilities:
  - metrics
  - alerting-source
env_keys:
  config:
    - MONITORING_PANELS_JSON
  secret: []
secrets_required: []
ports:
  - name: http
    container_port: 9090
    protocol: TCP
    expose: internal
    purpose: Prometheus UI/API, operator only
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Prometheus 需要写 TSDB 数据卷。
    writable_mounts:
      - runtime-state
student_access:
  enabled: false
data_volumes:
  - name: data
    mount_path: /prometheus
    backup_required: true
backup:
  required: true
  mode: retention-and-volume
network:
  expose: internal
  default_deny: true
resources:
  cpu_request: 250m
  cpu_limit: "1"
  memory_request: 512Mi
  memory_limit: 2Gi
  ephemeral_storage_limit: 1Gi
selftest:
  upstream_healthcheck:
    type: http
    path: /-/ready
    port: 9090
build:
  context: images/observability/prometheus
  dockerfile: Dockerfile
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
