# 本文件声明 judger/static-scan 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: judger
name: static-scan
image: judger/static-scan
labels:
  app.kubernetes.io/name: static-scan
  app.kubernetes.io/component: judger
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: judger
  chaimir.io/image: judger/static-scan
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: judge-private
  chaimir.io/scope: judge
  chaimir.io/source: platform-built
description: Solidity/SWC/gas 静态扫描判题镜像。
source:
  type: platform-built
upstream:
  packages:
    - slither-analyzer==0.11.3
  binaries:
    - solc 0.8.26
  runtime: alpine:3.23
  runtime_digest: sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
  reuse_policy: mature-security-toolchain-wrapper
data_driven: true
capabilities:
  - judger
  - static-security-scan
judger:
  type: static-scan
  modes:
    - slither
    - swc
    - gas
  output_contract:
    required_fields:
      - passed
      - score
      - max_score
      - details
  leaks_expected_values: false
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: false
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
security_exceptions:
  - field: read_only_root_filesystem
    reason: Slither 判题需要写入 /judge/result.json 与临时分析日志;运行期只允许挂载 judge 工作目录和临时缓存。
    writable_mounts:
      - judge-workdir
      - tool-cache
student_access:
  enabled: false
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 4Gi
  ephemeral_storage_limit: 4Gi
  timeout_seconds: 120
build:
  context: images/judger/static-scan
  dockerfile: Dockerfile
selftest:
  commands:
    - name: slither-version
      command:
        - sh
        - -lc
        - slither --version && solc --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
