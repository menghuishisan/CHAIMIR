# 本文件声明 judger/testcase-fisco 镜像的职责、端口、安全、资源和供应链约束。
schema_version: 1
category: judger
name: testcase-fisco
image: judger/testcase-fisco
labels:
  app.kubernetes.io/name: testcase-fisco
  app.kubernetes.io/component: judger
  app.kubernetes.io/part-of: chaimir
  chaimir.io/category: judger
  chaimir.io/image: judger/testcase-fisco
  chaimir.io/data-driven: "true"
  chaimir.io/student-access: "false"
  chaimir.io/sensitivity: judge-private
  chaimir.io/scope: judge
  chaimir.io/source: platform-built
description: FISCO BCOS 合约测试用例判题镜像。
source:
  type: platform-built
upstream:
  image: fiscoorg/fiscobcos:v3.12.1
  digest: sha256:93db5277a5c896fde402f2165d133cc3d346effef4165ec417ef098eb2ede74b
  reuse_policy: official-static-binary-on-supported-base
data_driven: true
capabilities:
  - judger
  - fisco-contract-testcase-runner
judger:
  type: testcase
  modes:
    - fisco-contract
  output_contract:
    required_fields:
      - passed
      - score
      - max_score
      - details
  leaks_expected_values: false
ports: []
local_dev:
  host_mappings: []
security:
  run_as_non_root: true
  read_only_root_filesystem: true
  allow_privilege_escalation: false
  privileged: false
  host_network: false
  automount_service_account_token: false
  drop_capabilities:
    - ALL
  network_policy: deny-all
student_access:
  enabled: false
resources:
  cpu_request: 500m
  cpu_limit: "2"
  memory_request: 1Gi
  memory_limit: 3Gi
  ephemeral_storage_limit: 4Gi
  timeout_seconds: 180
build:
  context: images/judger/testcase-fisco
  dockerfile: Dockerfile
selftest:
  commands:
    - name: fisco-version
      command:
        - fisco-bcos
        - --version
supply_chain:
  sbom: true
  trivy_required: true
  cosign_required: true
  pull_by_digest_in_production: true
