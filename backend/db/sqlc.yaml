# sqlc 配置:SQL → 类型安全 Go 代码生成。
# 依据 docs/总-技术选型.md §2.3:sqlc + pgx;SQL-first,RLS 透明。
# 模块边界(总-工程目录设计 §2.1):生成代码进各模块私有包 internal/modules/<m>/internal/sqlcgen,
#   绝不被其他模块 import。每模块一个 sql 条目,schema 共用全量迁移(推断列类型)。
version: "2"
sql:
  # M1 identity。
  - engine: postgresql
    schema: migrations
    queries: queries/identity.sql
    gen:
      go:
        package: sqlcgen
        out: ../internal/modules/identity/internal/sqlcgen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        # bytea 默认 []byte,timestamptz 默认 time.Time,无需 override。
  # M2 sandbox。
  - engine: postgresql
