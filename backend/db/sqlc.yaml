version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations"
    queries:
      - "queries/identity.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "../internal/modules/identity/internal/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
