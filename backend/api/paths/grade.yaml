# 本文件按模块维护 grade 路径项。
/api/v1/grade-center/level-configs:
  get:
    tags: [grade]
    summary: 等级映射配置列表
    operationId: gradeListLevelConfigs
    x-chaimir-audience: user
    security: [{ bearerAuth: [] }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [grade]
    summary: 创建等级映射配置
    operationId: gradeCreateLevelConfig
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/level-configs/{id}:
  put:
    tags: [grade]
    summary: 更新等级映射配置
    operationId: gradeUpdateLevelConfig
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/semesters:
  get:
    tags: [grade]
    summary: 学期列表
    operationId: gradeListSemesters
    x-chaimir-audience: user
    security: [{ bearerAuth: [] }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [grade]
    summary: 创建学期
    operationId: gradeCreateSemester
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/reviews:
  get:
    tags: [grade]
    summary: 成绩审核列表
    operationId: gradeListReviews
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    parameters:
      - { $ref: "#/components/parameters/StatusQuery" }
      - { $ref: "#/components/parameters/PageQuery" }
      - { $ref: "#/components/parameters/SizeQuery" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [grade]
    summary: 提交课程成绩审核
    operationId: gradeSubmitReview
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/reviews/{id}/approve:
  post:
    tags: [grade]
    summary: 通过成绩审核
    operationId: gradeApproveReview
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/reviews/{id}/reject:
  post:
    tags: [grade]
    summary: 驳回成绩审核
    operationId: gradeRejectReview
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/reviews/{id}/unlock:
  post:
    tags: [grade]
    summary: 解锁成绩审核状态
    operationId: gradeUnlockReview
    x-chaimir-audience: school-admin
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/students/{id}/grades:
  get:
    tags: [grade]
    summary: 学生学期成绩
    operationId: gradeStudentGrades
    x-chaimir-audience: user
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }, { name: semester, in: query, schema: { type: string } }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/grade-center/students/{id}/gpa:
  get:
    tags: [grade]
