# 本文件按模块维护 contest 路径项。
/api/v1/contest/contests:
  get:
    tags: [contest]
    summary: 竞赛列表
    operationId: contestListContests
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/StatusQuery" }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [contest]
    summary: 创建竞赛
    operationId: contestCreateContest
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
