# 本文件按模块维护 teaching 路径项。
/api/v1/teaching/courses:
  get:
    tags: [teaching]
    summary: 我的课程列表
    operationId: teachingListCourses
    x-chaimir-audience: user
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: role, in: query, schema: { type: string } }
      - { $ref: "#/components/parameters/StatusQuery" }
      - { $ref: "#/components/parameters/PageQuery" }
      - { $ref: "#/components/parameters/SizeQuery" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [teaching]
    summary: 创建课程
    operationId: teachingCreateCourse
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
