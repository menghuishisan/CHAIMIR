# 本文件按模块维护 content 路径项。
/api/v1/content/items:
  get:
    tags: [content]
    summary: 内容检索
    operationId: contentListItems
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: type, in: query, schema: { type: string } }
      - { name: category, in: query, schema: { type: string } }
      - { name: difficulty, in: query, schema: { type: string } }
      - { name: tag, in: query, schema: { type: string } }
      - { name: kp, in: query, schema: { type: string } }
      - { $ref: "#/components/parameters/KeywordQuery" }
      - { name: visibility, in: query, schema: { type: string } }
      - { name: author, in: query, schema: { type: string } }
      - { $ref: "#/components/parameters/PageQuery" }
      - { $ref: "#/components/parameters/SizeQuery" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [content]
    summary: 创建内容草稿
    operationId: contentCreateItem
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/content/items/system-import:
  post:
    tags: [content]
    summary: 系统或外部源自动建题入口
    operationId: contentSystemImport
    x-chaimir-audience: internal
    x-chaimir-internal: true
    security: [{ serviceAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/content/items/batch:
  post:
    tags: [content]
    summary: 批量取内容
    operationId: contentBatchItems
    x-chaimir-audience: internal
    x-chaimir-internal: true
    security: [{ serviceAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/content/items/{item}:
  patch:
    tags: [content]
    summary: 编辑内容草稿
    operationId: contentUpdateItem
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/ItemPath" }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  delete:
    tags: [content]
    summary: 软删内容
    operationId: contentDeleteItem
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/ItemPath" }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
