# 本文件按模块维护 experiment 路径项。
/api/v1/experiment/experiments:
  get:
    tags: [experiment]
    summary: 实验列表
    operationId: experimentListExperiments
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters:
      - { name: course_id, in: query, schema: { type: integer, format: int64 } }
      - { $ref: "#/components/parameters/StatusQuery" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
  post:
    tags: [experiment]
    summary: 创建实验
    operationId: experimentCreateExperiment
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/experiment/experiments/{id}:
  patch:
    tags: [experiment]
    summary: 编辑实验组件编排
    operationId: experimentUpdateExperiment
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    requestBody: { $ref: "#/components/requestBodies/ObjectBody" }
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/experiment/experiments/{id}/validate:
  post:
    tags: [experiment]
    summary: 发布前校验实验依赖
    operationId: experimentValidateExperiment
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/experiment/experiments/{id}/publish:
  post:
    tags: [experiment]
    summary: 发布实验
    operationId: experimentPublishExperiment
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: "#/components/parameters/IDPath" }]
    responses: { "200": { $ref: "#/components/responses/Standard" }, default: { $ref: "#/components/responses/Error" } }
/api/v1/experiment/experiments/{id}/unpublish:
  post:
    tags: [experiment]
    summary: 下架实验
    operationId: experimentUnpublishExperiment
    x-chaimir-audience: teacher
    security: [{ bearerAuth: [] }]
