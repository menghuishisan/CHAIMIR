openapi: 3.0.3
info:
  title: Chaimir 后端 API 契约
  version: 0.1.0
  description: |
    Chaimir 区块链教学、实验、竞赛平台后端 API 契约。
    本文件是 `backend/api` 的接口描述层,不承载运行时业务实现。
    路径来源于 `docs/总-API接口总览.md`、各模块接口设计文档和后端模块 `api*.go` 已注册路由。
servers:
  - url: https://{host}
    variables:
      host:
        default: api.chaimir.example.com
tags:
  - name: health
    description: 服务健康探针
  - name: identity
    description: M1 身份与租户
  - name: transfer
    description: 基础横切统一导入导出中心
  - name: sandbox
    description: M2 沙箱引擎
  - name: judge
    description: M3 评测引擎
  - name: sim
    description: M4 仿真可视化引擎
  - name: content
    description: M5 题库与模板中心
  - name: teaching
    description: M6 教学
  - name: experiment
    description: M7 实验
  - name: contest
    description: M8 竞赛
  - name: admin
    description: M9 管理后台
  - name: notify
    description: M10 通知与实时推送
  - name: grade
    description: M11 成绩中心
