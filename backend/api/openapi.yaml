components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: M1 JWT Access Token。
    serviceAuth:
      type: apiKey
      in: header
      name: X-Service-Signature
      description: 内部服务 HMAC-SHA256 签名,签名输入绑定 method、path、tenant_id、source_ref、timestamp 与 trace_id。
    wsTicketAuth:
      type: apiKey
      in: query
      name: ticket
      description: M1 `/api/v1/auth/ws-ticket` 签发的短时路径绑定 WebSocket 连接票据。
  parameters:
    IDPath:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CIDPath:
      name: cid
      in: path
      required: true
      schema: { type: integer, format: int64 }
    LIDPath:
      name: lid
      in: path
      required: true
      schema: { type: integer, format: int64 }
    SIDPath:
      name: sid
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CPPath:
      name: cp
      in: path
      required: true
      schema: { type: string }
    StagePath:
      name: stage
      in: path
      required: true
      schema: { type: string }
    ProblemIDPath:
      name: problem_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ItemPath:
      name: item
      in: path
      required: true
      schema: { type: string }
    CodePath:
      name: code
      in: path
      required: true
      schema: { type: string }
    KeyPath:
      name: key
      in: path
      required: true
      schema: { type: string }
    VersionPath:
      name: version
      in: path
      required: true
      schema: { type: string }
    ImagePath:
      name: img
      in: path
      required: true
      schema: { type: string }
    ToolCodePath:
      name: tool_code
      in: path
      required: true
      schema: { type: string }
    ProxyPath:
      name: proxy_path
      in: path
      required: true
      schema: { type: string }
      description: Gin 通配代理路径,对应 `*proxy_path`。
    TenantCodePath:
      name: tenant_code
      in: path
      required: true
      schema: { type: string }
    TenantCodeHeader:
      name: X-Tenant-Code
      in: header
      required: false
      schema: { type: string }
    PageQuery:
      name: page
      in: query
      required: false
      schema: { type: integer, default: 1, minimum: 1 }
    SizeQuery:
      name: size
      in: query
      required: false
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    StatusQuery:
      name: status
      in: query
      required: false
      schema: { type: string }
    KeywordQuery:
      name: keyword
      in: query
      required: false
      schema: { type: string }
    FromQuery:
      name: from
      in: query
      required: false
      schema: { type: string, format: date-time }
    ToQuery:
      name: to
      in: query
      required: false
      schema: { type: string, format: date-time }
    FormatQuery:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum: [xlsx, csv]
    FilePathQuery:
      name: path
      in: query
      required: false
      schema: { type: string }
  requestBodies:
    ObjectBody:
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ObjectPayload"
    MultipartBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            additionalProperties: true
  responses:
    Standard:
      description: 统一成功响应。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    Error:
      description: 统一错误响应。技术原因只进入日志,不进入响应体。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Binary:
      description: 文件下载响应。
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    PlainOK:
      description: 探针成功。
      content:
        text/plain:
          schema:
            type: string
  schemas:
    ObjectPayload:
      type: object
      additionalProperties: true
      description: 文档未细化字段时使用的通用 JSON 对象;具体字段以对应模块接口设计和 DTO 为准。
    StandardResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
    ErrorResponse:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          oneOf:
            - type: integer
            - type: string
          description: 业务错误码,按 `docs/总-API接口总览.md` 分段。
        message:
          type: string
          description: 用户向友好文案,不得包含堆栈、SQL、内部字段、连接串或第三方原始错误。
        trace_id:
          type: string
          description: 报障定位编号。
